<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>問題演習アプリ</title>
<style>
:root{
  --bg:#f4f5f7;
  --bg-card:#ffffff;
  --fg:#1c1e21;
  --fg-muted:#6b7280;
  --accent:#4f46e5;
  --accent-fg:#ffffff;
  --border:#e5e7eb;
  --correct:#16a34a;
  --incorrect:#dc2626;
  --radius:16px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#111318;
    --bg-card:#1c1f26;
    --fg:#f2f3f5;
    --fg-muted:#9aa1ac;
    --accent:#818cf8;
    --accent-fg:#111318;
    --border:#2c303a;
    --correct:#4ade80;
    --incorrect:#f87171;
    --shadow:0 1px 3px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.3);
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--fg);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI","Segoe UI",Roboto,sans-serif;
  line-height:1.65;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
.topbar{
  position:sticky;top:0;z-index:10;
  background:var(--bg-card);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
}
.topbar h1{
  margin:0;font-size:17px;font-weight:700;text-align:center;
}
#app{
  flex:1;
  width:100%;
  max-width:560px;
  margin:0 auto;
  padding:20px 16px 40px;
}
.screen.hidden{display:none;}
.lead{
  color:var(--fg-muted);
  font-size:14px;
  margin:0 0 18px;
}
.panel{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}
.panel h2{
  margin:0 0 10px;
  font-size:14px;
  font-weight:700;
  color:var(--fg-muted);
}
.panel-head{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;
}
.panel-head h2{margin:0;}
.panel-actions{display:flex;gap:10px;}
.link-btn{
  background:none;border:none;color:var(--accent);font-size:13px;font-weight:600;
  padding:4px 2px;cursor:pointer;
}
.chip-group{display:flex;gap:8px;flex-wrap:wrap;}
.chip{
  display:flex;align-items:center;gap:6px;
  border:1px solid var(--border);
  border-radius:999px;
  padding:8px 14px;
  font-size:14px;
  cursor:pointer;
  user-select:none;
}
.chip input{accent-color:var(--accent);width:16px;height:16px;}
.section-list{display:flex;flex-direction:column;gap:2px;max-height:320px;overflow-y:auto;}
.section-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 4px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
}
.section-item:last-child{border-bottom:none;}
.section-item input{accent-color:var(--accent);width:17px;height:17px;flex:none;}
.section-title{flex:1;font-size:14px;}
.section-count{font-size:11px;color:var(--fg-muted);white-space:nowrap;}
.switch-row{
  display:flex;align-items:center;justify-content:space-between;
  font-size:14px;cursor:pointer;
}
.switch-row input{accent-color:var(--accent);width:38px;height:22px;}
.error{
  background:rgba(220,38,38,.1);
  color:var(--incorrect);
  border-radius:10px;
  padding:10px 14px;
  font-size:13px;
  margin-bottom:14px;
}
.error.hidden{display:none;}
.primary-btn{
  display:block;width:100%;
  background:var(--accent);
  color:var(--accent-fg);
  border:none;border-radius:12px;
  padding:15px;
  font-size:16px;font-weight:700;
  cursor:pointer;
  margin-bottom:10px;
}
.primary-btn:active{opacity:.85;}
.primary-btn.hidden{display:none;}
.secondary-btn{
  display:block;width:100%;
  background:var(--bg-card);
  color:var(--fg);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
  font-size:15px;font-weight:600;
  cursor:pointer;
  margin-bottom:10px;
}
.secondary-btn.hidden{display:none;}
.quit-btn{
  display:block;width:100%;text-align:center;margin-top:18px;color:var(--fg-muted);
}

/* quiz screen */
.progress-wrap{margin-bottom:16px;}
.progress-bar{
  height:8px;border-radius:999px;background:var(--border);overflow:hidden;
}
.progress-fill{
  height:100%;background:var(--accent);width:0%;
  transition:width .25s ease;
}
.progress-label{
  display:flex;justify-content:space-between;
  font-size:12px;color:var(--fg-muted);margin-top:6px;
}
.card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:var(--shadow);
}
.q-type-badge{
  display:inline-block;
  font-size:11px;font-weight:700;
  padding:3px 10px;border-radius:999px;
  margin-bottom:12px;
  background:rgba(79,70,229,.12);
  color:var(--accent);
}
.q-type-badge.essay{
  background:rgba(220,38,38,.1);
  color:var(--incorrect);
}
.q-text{font-size:17px;font-weight:600;margin-bottom:14px;word-break:break-word;}
.q-text b{font-weight:800;}
.essay-input{
  width:100%;min-height:90px;
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 12px;
  font-size:14px;
  font-family:inherit;
  background:var(--bg);
  color:var(--fg);
  margin-bottom:14px;
  resize:vertical;
}
.essay-input.hidden{display:none;}
.answer-box{
  margin-top:16px;
  padding-top:16px;
  border-top:1px dashed var(--border);
}
.answer-box.hidden{display:none;}
.answer-label{
  font-size:11px;font-weight:700;color:var(--fg-muted);margin-bottom:6px;
}
.a-text{font-size:15px;margin-bottom:16px;word-break:break-word;}
.grade-row{display:flex;gap:10px;}
.grade-btn{
  flex:1;border:none;border-radius:12px;padding:14px;
  font-size:15px;font-weight:700;cursor:pointer;color:#fff;
}
.grade-btn.right{background:var(--correct);}
.grade-btn.wrong{background:var(--incorrect);}

/* result screen */
.ring-wrap{
  position:relative;
  width:180px;height:180px;
  margin:10px auto 22px;
}
.ring{width:100%;height:100%;transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--border);stroke-width:10;}
.ring-fg{
  fill:none;stroke:var(--accent);stroke-width:10;stroke-linecap:round;
  transition:stroke-dashoffset .6s ease, stroke .3s ease;
}
.ring-center{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.ring-pct{font-size:32px;font-weight:800;}
.ring-sub{font-size:13px;color:var(--fg-muted);margin-top:2px;}
.result-actions{margin-bottom:18px;}
.wrong-list h3{font-size:14px;color:var(--fg-muted);margin:18px 0 10px;}
.all-correct{
  text-align:center;color:var(--correct);font-weight:700;padding:20px 0;
}
.wrong-item{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px 14px;
  margin-bottom:8px;
}
.wrong-item summary{
  font-size:14px;font-weight:600;cursor:pointer;
}
.wrong-answer{
  margin-top:10px;padding-top:10px;
  border-top:1px dashed var(--border);
  font-size:14px;color:var(--fg-muted);
}
.footer{
  text-align:center;
  font-size:11px;
  color:var(--fg-muted);
  padding:16px;
}
</style>
</head>
<body>
<header class="topbar"><h1>問題演習</h1></header>
<main id="app">

  <section id="screen-setup" class="screen">
    <p class="lead">全2回・一問一答3問／記述式1問。出題形式と範囲を選んで演習を始めます。</p>

    <div class="panel">
      <h2>出題形式</h2>
      <div class="chip-group" id="modeChips">
        <label class="chip"><input type="checkbox" value="qa" checked>一問一答</label>
        <label class="chip"><input type="checkbox" value="essay" checked>記述式</label>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h2>範囲</h2>
        <div class="panel-actions">
          <button type="button" id="selectAllBtn" class="link-btn">全選択</button>
          <button type="button" id="selectNoneBtn" class="link-btn">全解除</button>
        </div>
      </div>
      <div class="section-list" id="sectionList"></div>
    </div>

    <div class="panel">
      <label class="switch-row">
        <span>ランダム出題</span>
        <input type="checkbox" id="randomToggle" checked>
      </label>
    </div>

    <div id="setupError" class="error hidden"></div>
    <button type="button" id="startBtn" class="primary-btn">演習を始める</button>
    <button type="button" id="reviewWrongBtn" class="secondary-btn hidden">間違えた問題だけ復習する（前回 <span id="wrongCount">0</span>問）</button>
  </section>

  <section id="screen-quiz" class="screen hidden">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label"><span id="progressCount">1/1</span><span id="progressChapter"></span></div>
    </div>
    <div class="card" id="qCard">
      <div class="q-type-badge" id="qTypeBadge">一問一答</div>
      <div class="q-text" id="qText"></div>
      <textarea id="essayInput" class="essay-input hidden" placeholder="ここに要点を書き出してから答え合わせ（採点はされません・自己チェック用です）"></textarea>
      <button type="button" id="revealBtn" class="primary-btn">答えを見る</button>
      <div class="answer-box hidden" id="answerBox">
        <div class="answer-label">解答</div>
        <div class="a-text" id="aText"></div>
        <div class="grade-row">
          <button type="button" id="gradeWrongBtn" class="grade-btn wrong">× 不正解</button>
          <button type="button" id="gradeRightBtn" class="grade-btn right">○ 正解</button>
        </div>
      </div>
    </div>
    <button type="button" id="quitBtn" class="link-btn quit-btn">中断してトップへ戻る</button>
  </section>

  <section id="screen-result" class="screen hidden">
    <div class="ring-wrap">
      <svg viewBox="0 0 120 120" class="ring">
        <circle class="ring-bg" cx="60" cy="60" r="52"></circle>
        <circle class="ring-fg" id="ringFg" cx="60" cy="60" r="52"></circle>
      </svg>
      <div class="ring-center">
        <div class="ring-pct" id="ringPct">0%</div>
        <div class="ring-sub" id="ringSub">0/0問正解</div>
      </div>
    </div>
    <div class="result-actions">
      <button type="button" id="reviewWrongBtn2" class="primary-btn hidden">間違えた問題だけ復習する</button>
      <button type="button" id="retryAllBtn" class="secondary-btn">同じ条件でもう一度</button>
      <button type="button" id="backToSetupBtn" class="secondary-btn">最初から選び直す</button>
    </div>
    <div class="wrong-list" id="wrongList"></div>
  </section>

</main>
<footer class="footer">自己採点は目安です</footer>
<script>
const DATA=[{"title": "第1講　概観", "sub": "", "qa": [{"q": "GDPの略称が指すものは何か。", "a": "国内総生産(Gross Domestic Product)"}, {"q": "日本銀行の政策金利の名称は？", "a": "無担保コールレート(オーバーナイト物)"}], "essay": [{"q": "高度経済成長の要因を3つ挙げて説明せよ。", "a": "要点：<br>①設備投資の拡大<br>②輸出主導の外需<br>③安価で豊富な労働力"}]}, {"title": "第2講　金融政策", "sub": "", "qa": [{"q": "量的緩和政策の英略称は？", "a": "QE (Quantitative Easing)"}], "essay": []}];

let session=null;
let lastWrongPool=null;

function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showScreen(name){
  ['setup','quiz','result'].forEach(function(s){
    document.getElementById('screen-'+s).classList.toggle('hidden', s!==name);
  });
  window.scrollTo(0,0);
}

function initSetup(){
  const list=document.getElementById('sectionList');
  list.innerHTML=DATA.map(function(sec,i){
    return '<label class="section-item">'
      +'<input type="checkbox" class="sectionChk" value="'+i+'" checked>'
      +'<span class="section-title">'+escapeHtml(sec.title)+'</span>'
      +'<span class="section-count">一問一答'+sec.qa.length+'・記述'+sec.essay.length+'</span>'
      +'</label>';
  }).join('');
}

function getSelectedModes(){
  return new Set(Array.prototype.map.call(
    document.querySelectorAll('#modeChips input:checked'), function(el){return el.value;}
  ));
}
function getSelectedSections(){
  return new Set(Array.prototype.map.call(
    document.querySelectorAll('.sectionChk:checked'), function(el){return Number(el.value);}
  ));
}

function buildPool(sectionsSet, modesSet){
  const pool=[];
  DATA.forEach(function(sec, si){
    if(!sectionsSet.has(si)) return;
    if(modesSet.has('qa')) sec.qa.forEach(function(item){
      pool.push({q:item.q, a:item.a, type:'qa', chapter:sec.title});
    });
    if(modesSet.has('essay')) sec.essay.forEach(function(item){
      pool.push({q:item.q, a:item.a, type:'essay', chapter:sec.title});
    });
  });
  return pool;
}

function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    const tmp=a[i]; a[i]=a[j]; a[j]=tmp;
  }
  return a;
}

function showError(msg){
  const el=document.getElementById('setupError');
  el.textContent=msg;
  el.classList.remove('hidden');
}
function hideError(){
  document.getElementById('setupError').classList.add('hidden');
}

function startBtnHandler(){
  const modes=getSelectedModes();
  const sections=getSelectedSections();
  if(modes.size===0){ showError('出題形式を1つ以上選んでください'); return; }
  if(sections.size===0){ showError('範囲を1つ以上選んでください'); return; }
  let pool=buildPool(sections, modes);
  if(pool.length===0){ showError('選んだ条件に該当する問題がありません'); return; }
  hideError();
  if(document.getElementById('randomToggle').checked) pool=shuffle(pool);
  beginSession(pool);
}

function beginSession(pool){
  session={pool:pool, idx:0, results:new Array(pool.length).fill(null)};
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion(){
  const item=session.pool[session.idx];
  document.getElementById('progressCount').textContent=(session.idx+1)+'/'+session.pool.length;
  document.getElementById('progressChapter').textContent=item.chapter||'';
  document.getElementById('progressFill').style.width=(session.idx/session.pool.length*100)+'%';

  const badge=document.getElementById('qTypeBadge');
  const isEssay=item.type==='essay';
  badge.textContent=isEssay?'記述式':'一問一答';
  badge.className='q-type-badge'+(isEssay?' essay':'');

  document.getElementById('qText').innerHTML=item.q;

  const essayInput=document.getElementById('essayInput');
  if(isEssay){ essayInput.classList.remove('hidden'); essayInput.value=''; }
  else { essayInput.classList.add('hidden'); }

  document.getElementById('answerBox').classList.add('hidden');
  document.getElementById('aText').innerHTML='';
  const revealBtn=document.getElementById('revealBtn');
  revealBtn.classList.remove('hidden');
  revealBtn.textContent=isEssay?'模範解答を見る':'答えを見る';
}

function revealAnswer(){
  const item=session.pool[session.idx];
  document.getElementById('aText').innerHTML=item.a;
  document.getElementById('answerBox').classList.remove('hidden');
  document.getElementById('revealBtn').classList.add('hidden');
}

function grade(correct){
  session.results[session.idx]=correct;
  session.idx++;
  if(session.idx>=session.pool.length){
    finishSession();
  } else {
    renderQuestion();
  }
}

function finishSession(){
  document.getElementById('progressFill').style.width='100%';
  showScreen('result');

  const total=session.pool.length;
  const correct=session.results.filter(function(r){return r===true;}).length;
  const pct=total?Math.round(correct/total*100):0;

  document.getElementById('ringPct').textContent=pct+'%';
  document.getElementById('ringSub').textContent=correct+'/'+total+'問正解';

  const circumference=2*Math.PI*52;
  const fg=document.getElementById('ringFg');
  fg.style.strokeDasharray=String(circumference);
  fg.style.strokeDashoffset=String(circumference*(1-pct/100));
  fg.style.stroke=pct>=80?'var(--correct)':(pct>=50?'var(--accent)':'var(--incorrect)');

  const wrongItems=session.pool.filter(function(item,i){return session.results[i]===false;});
  lastWrongPool=wrongItems;

  const wrongListEl=document.getElementById('wrongList');
  if(wrongItems.length===0){
    wrongListEl.innerHTML='<p class="all-correct">全問正解でした。</p>';
  } else {
    wrongListEl.innerHTML='<h3>間違えた問題</h3>'+wrongItems.map(function(item){
      return '<details class="wrong-item"><summary>'+item.q+'</summary>'
        +'<div class="wrong-answer">'+item.a+'</div></details>';
    }).join('');
  }
  document.getElementById('reviewWrongBtn2').classList.toggle('hidden', wrongItems.length===0);
  updateSetupReviewButton();
}

function updateSetupReviewButton(){
  const btn=document.getElementById('reviewWrongBtn');
  if(lastWrongPool && lastWrongPool.length>0){
    btn.classList.remove('hidden');
    document.getElementById('wrongCount').textContent=lastWrongPool.length;
  } else {
    btn.classList.add('hidden');
  }
}

function startReviewWrong(){
  if(!lastWrongPool || lastWrongPool.length===0) return;
  let pool=lastWrongPool.slice();
  if(document.getElementById('randomToggle').checked) pool=shuffle(pool);
  beginSession(pool);
}

function retrySameCondition(){
  if(!session) return;
  let pool=session.pool.slice();
  if(document.getElementById('randomToggle').checked) pool=shuffle(pool);
  beginSession(pool);
}

initSetup();
document.getElementById('selectAllBtn').addEventListener('click', function(){
  document.querySelectorAll('.sectionChk').forEach(function(c){c.checked=true;});
});
document.getElementById('selectNoneBtn').addEventListener('click', function(){
  document.querySelectorAll('.sectionChk').forEach(function(c){c.checked=false;});
});
document.getElementById('startBtn').addEventListener('click', startBtnHandler);
document.getElementById('revealBtn').addEventListener('click', revealAnswer);
document.getElementById('gradeRightBtn').addEventListener('click', function(){grade(true);});
document.getElementById('gradeWrongBtn').addEventListener('click', function(){grade(false);});
document.getElementById('quitBtn').addEventListener('click', function(){showScreen('setup');});
document.getElementById('reviewWrongBtn').addEventListener('click', startReviewWrong);
document.getElementById('reviewWrongBtn2').addEventListener('click', startReviewWrong);
document.getElementById('retryAllBtn').addEventListener('click', retrySameCondition);
document.getElementById('backToSetupBtn').addEventListener('click', function(){showScreen('setup');});
</script>
</body>
</html>
