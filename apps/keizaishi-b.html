<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>経済史入門B 問題演習アプリ</title>
<style>
:root{
  --bg:#f4f5f7;
  --bg-card:#ffffff;
  --fg:#1c1e21;
  --fg-muted:#6b7280;
  --accent:#4f46e5;
  --accent-fg:#ffffff;
  --border:#e5e7eb;
  --correct:#16a34a;
  --incorrect:#dc2626;
  --radius:16px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#111318;
    --bg-card:#1c1f26;
    --fg:#f2f3f5;
    --fg-muted:#9aa1ac;
    --accent:#818cf8;
    --accent-fg:#111318;
    --border:#2c303a;
    --correct:#4ade80;
    --incorrect:#f87171;
    --shadow:0 1px 3px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.3);
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--fg);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI","Segoe UI",Roboto,sans-serif;
  line-height:1.65;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
.topbar{
  position:sticky;top:0;z-index:10;
  background:var(--bg-card);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
}
.topbar h1{
  margin:0;font-size:17px;font-weight:700;text-align:center;
}
#app{
  flex:1;
  width:100%;
  max-width:560px;
  margin:0 auto;
  padding:20px 16px 40px;
}
.screen.hidden{display:none;}
.lead{
  color:var(--fg-muted);
  font-size:14px;
  margin:0 0 18px;
}
.panel{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}
.panel h2{
  margin:0 0 10px;
  font-size:14px;
  font-weight:700;
  color:var(--fg-muted);
}
.panel-head{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;
}
.panel-head h2{margin:0;}
.panel-actions{display:flex;gap:10px;}
.link-btn{
  background:none;border:none;color:var(--accent);font-size:13px;font-weight:600;
  padding:4px 2px;cursor:pointer;
}
.chip-group{display:flex;gap:8px;flex-wrap:wrap;}
.chip{
  display:flex;align-items:center;gap:6px;
  border:1px solid var(--border);
  border-radius:999px;
  padding:8px 14px;
  font-size:14px;
  cursor:pointer;
  user-select:none;
}
.chip input{accent-color:var(--accent);width:16px;height:16px;}
.section-list{display:flex;flex-direction:column;gap:2px;max-height:320px;overflow-y:auto;}
.section-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 4px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
}
.section-item:last-child{border-bottom:none;}
.section-item input{accent-color:var(--accent);width:17px;height:17px;flex:none;}
.section-title{flex:1;font-size:14px;}
.section-count{font-size:11px;color:var(--fg-muted);white-space:nowrap;}
.switch-row{
  display:flex;align-items:center;justify-content:space-between;
  font-size:14px;cursor:pointer;
}
.switch-row input{accent-color:var(--accent);width:38px;height:22px;}
.error{
  background:rgba(220,38,38,.1);
  color:var(--incorrect);
  border-radius:10px;
  padding:10px 14px;
  font-size:13px;
  margin-bottom:14px;
}
.error.hidden{display:none;}
.primary-btn{
  display:block;width:100%;
  background:var(--accent);
  color:var(--accent-fg);
  border:none;border-radius:12px;
  padding:15px;
  font-size:16px;font-weight:700;
  cursor:pointer;
  margin-bottom:10px;
}
.primary-btn:active{opacity:.85;}
.primary-btn.hidden{display:none;}
.secondary-btn{
  display:block;width:100%;
  background:var(--bg-card);
  color:var(--fg);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
  font-size:15px;font-weight:600;
  cursor:pointer;
  margin-bottom:10px;
}
.secondary-btn.hidden{display:none;}
.quit-btn{
  display:block;width:100%;text-align:center;margin-top:18px;color:var(--fg-muted);
}

/* quiz screen */
.progress-wrap{margin-bottom:16px;}
.progress-bar{
  height:8px;border-radius:999px;background:var(--border);overflow:hidden;
}
.progress-fill{
  height:100%;background:var(--accent);width:0%;
  transition:width .25s ease;
}
.progress-label{
  display:flex;justify-content:space-between;
  font-size:12px;color:var(--fg-muted);margin-top:6px;
}
.card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:var(--shadow);
}
.q-type-badge{
  display:inline-block;
  font-size:11px;font-weight:700;
  padding:3px 10px;border-radius:999px;
  margin-bottom:12px;
  background:rgba(79,70,229,.12);
  color:var(--accent);
}
.q-type-badge.essay{
  background:rgba(220,38,38,.1);
  color:var(--incorrect);
}
.q-text{font-size:17px;font-weight:600;margin-bottom:14px;word-break:break-word;}
.q-text b{font-weight:800;}
.essay-input{
  width:100%;min-height:90px;
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 12px;
  font-size:14px;
  font-family:inherit;
  background:var(--bg);
  color:var(--fg);
  margin-bottom:14px;
  resize:vertical;
}
.essay-input.hidden{display:none;}
.answer-box{
  margin-top:16px;
  padding-top:16px;
  border-top:1px dashed var(--border);
}
.answer-box.hidden{display:none;}
.answer-label{
  font-size:11px;font-weight:700;color:var(--fg-muted);margin-bottom:6px;
}
.a-text{font-size:15px;margin-bottom:16px;word-break:break-word;}
.grade-row{display:flex;gap:10px;}
.grade-btn{
  flex:1;border:none;border-radius:12px;padding:14px;
  font-size:15px;font-weight:700;cursor:pointer;color:#fff;
}
.grade-btn.right{background:var(--correct);}
.grade-btn.wrong{background:var(--incorrect);}

/* result screen */
.ring-wrap{
  position:relative;
  width:180px;height:180px;
  margin:10px auto 22px;
}
.ring{width:100%;height:100%;transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--border);stroke-width:10;}
.ring-fg{
  fill:none;stroke:var(--accent);stroke-width:10;stroke-linecap:round;
  transition:stroke-dashoffset .6s ease, stroke .3s ease;
}
.ring-center{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.ring-pct{font-size:32px;font-weight:800;}
.ring-sub{font-size:13px;color:var(--fg-muted);margin-top:2px;}
.result-actions{margin-bottom:18px;}
.wrong-list h3{font-size:14px;color:var(--fg-muted);margin:18px 0 10px;}
.all-correct{
  text-align:center;color:var(--correct);font-weight:700;padding:20px 0;
}
.wrong-item{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px 14px;
  margin-bottom:8px;
}
.wrong-item summary{
  font-size:14px;font-weight:600;cursor:pointer;
}
.wrong-answer{
  margin-top:10px;padding-top:10px;
  border-top:1px dashed var(--border);
  font-size:14px;color:var(--fg-muted);
}
.footer{
  text-align:center;
  font-size:11px;
  color:var(--fg-muted);
  padding:16px;
}
</style>
</head>
<body>
<header class="topbar"><h1>経済史入門B 演習</h1></header>
<main id="app">

  <section id="screen-setup" class="screen">
    <p class="lead">全12範囲（第1〜11講＋総合）・一問一答162問／記述式26問。出題形式と範囲を選んで演習を始めます。谷本雅之『経済史入門B』講義レジュメ・読解補足ノート準拠。</p>

    <div class="panel">
      <h2>出題形式</h2>
      <div class="chip-group" id="modeChips">
        <label class="chip"><input type="checkbox" value="qa" checked>一問一答</label>
        <label class="chip"><input type="checkbox" value="essay" checked>記述式</label>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h2>範囲</h2>
        <div class="panel-actions">
          <button type="button" id="selectAllBtn" class="link-btn">全選択</button>
          <button type="button" id="selectNoneBtn" class="link-btn">全解除</button>
        </div>
      </div>
      <div class="section-list" id="sectionList"></div>
    </div>

    <div class="panel">
      <label class="switch-row">
        <span>ランダム出題</span>
        <input type="checkbox" id="randomToggle" checked>
      </label>
    </div>

    <div id="setupError" class="error hidden"></div>
    <button type="button" id="startBtn" class="primary-btn">演習を始める</button>
    <button type="button" id="reviewWrongBtn" class="secondary-btn hidden">間違えた問題だけ復習する（前回 <span id="wrongCount">0</span>問）</button>
  </section>

  <section id="screen-quiz" class="screen hidden">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label"><span id="progressCount">1/1</span><span id="progressChapter"></span></div>
    </div>
    <div class="card" id="qCard">
      <div class="q-type-badge" id="qTypeBadge">一問一答</div>
      <div class="q-text" id="qText"></div>
      <textarea id="essayInput" class="essay-input hidden" placeholder="ここに要点を書き出してから答え合わせ（採点はされません・自己チェック用です）"></textarea>
      <button type="button" id="revealBtn" class="primary-btn">答えを見る</button>
      <div class="answer-box hidden" id="answerBox">
        <div class="answer-label">解答</div>
        <div class="a-text" id="aText"></div>
        <div class="grade-row">
          <button type="button" id="gradeWrongBtn" class="grade-btn wrong">× 不正解</button>
          <button type="button" id="gradeRightBtn" class="grade-btn right">○ 正解</button>
        </div>
      </div>
    </div>
    <button type="button" id="quitBtn" class="link-btn quit-btn">中断してトップへ戻る</button>
  </section>

  <section id="screen-result" class="screen hidden">
    <div class="ring-wrap">
      <svg viewBox="0 0 120 120" class="ring">
        <circle class="ring-bg" cx="60" cy="60" r="52"></circle>
        <circle class="ring-fg" id="ringFg" cx="60" cy="60" r="52"></circle>
      </svg>
      <div class="ring-center">
        <div class="ring-pct" id="ringPct">0%</div>
        <div class="ring-sub" id="ringSub">0/0問正解</div>
      </div>
    </div>
    <div class="result-actions">
      <button type="button" id="reviewWrongBtn2" class="primary-btn hidden">間違えた問題だけ復習する</button>
      <button type="button" id="retryAllBtn" class="secondary-btn">同じ条件でもう一度</button>
      <button type="button" id="backToSetupBtn" class="secondary-btn">最初から選び直す</button>
    </div>
    <div class="wrong-list" id="wrongList"></div>
  </section>

</main>
<footer class="footer">経済史入門B（谷本雅之）講義レジュメ・読解補足ノートに基づく自習用アプリ。出題傾向は2025年度後期過去問サンプルを参照。自己採点は目安です。</footer>
<script>
const DATA=[{"title": "第5講 日本経済の比較史――課題・視角・方法", "sub": "", "qa": [{"q": "この講義が近代日本の経済発展を捉える際の、二つの関心（視点）とは何か。", "a": "「キャッチアップとしての近代日本経済史」（欧米に追いつこうとして成長した日本）と「日本型経済の形成史としての近代日本経済史」（独自の型を作り上げてきた日本）。"}, {"q": "経済発展を測る基本指標は何か。また「1人当たり」「実質」にする理由は。", "a": "実質1人当たりGDP。「1人当たり」は経済規模を人口で調整するため、「実質化」は物価変動の影響を除くため。国際比較では通貨価値の相違も調整する。"}, {"q": "GDPとGNIの違いを説明せよ。", "a": "GDP（国内総生産）＝その年に国内で生産された付加価値の総額。GNI（国民総所得）＝国民が受け取った所得の総額で、どこにいようが日本人の所得を含む。"}, {"q": "1870〜2010年をカバーする長期GDP推計を提供する国際プロジェクトは。", "a": "Maddison Project（マディソン・プロジェクト）。歴史をさかのぼって各国の過去のGDP推移を推計する。"}, {"q": "縦軸が対数目盛のグラフで、線の傾きは何を表すか。", "a": "成長率。傾きが同じなら成長率が同じことを意味する。"}, {"q": "段階論的把握に含まれる二つの代表的立場は。共通する傾向も述べよ。", "a": "生産力の発展と生産関係に注目する立場（マルクス）と、市場の発展と所有権に注目する立場（ノース）。いずれも単線的発展論の傾向を持つ。"}, {"q": "経路依存（path dependence）とはどのような考え方か。どの視角の鍵概念か。", "a": "ある歴史的経緯が次に起こる事柄に影響を及ぼし、事象がその前の事象に依存するという考え方。類型論的把握（多系的発展論）の鍵概念。"}, {"q": "「後発性の不利と優位」を論じたのは誰か。「優位」の内容を説明せよ。", "a": "ガーシェンクロン。優位とは、後進国が先進国の開発した技術にただ乗りしてキャッチアップできること（不利は、先進国が作った市場で同種品を出す難しさ）。"}, {"q": "『大分岐（The Great Divergence）』の著者と、その方法的立場は。", "a": "K.ポメランツ。グローバル・ヒストリーの方法（国民国家・産業革命など欧米モデルを相対化し、比較史と関係史を組み合わせる）。"}, {"q": "生産関数 Y＝A・f(T,L,K) の各記号の意味は。", "a": "T＝土地、L＝労働、K＝資本（投入要素）、A＝技術。生産要素の供給構造の特徴を問うことが分析の視点となる。"}, {"q": "分析の三つの視点は「生産要素」「制度」ともう一つは何か。", "a": "心性・意識・思想。制度（ゲームのルール）だけでなく、宗教と経済の関係のような心性・意識・思想も人びとの行動を制約・促進する要因として考慮する。"}, {"q": "生産統計が整備される以前の時代に利用できる経済指標は何か。その限界は。", "a": "実質賃金。ただし賃金労働者の比重の問題や国際比較の方法論に課題がある。"}, {"q": "17世紀の人口動態について、ヨーロッパ・東アジア・日本の対比を述べよ。", "a": "ヨーロッパ＝不況と戦乱の「危機」の時代。東アジア＝明の衰退と清の勃興が交錯する動乱・人口減少の時代（共通背景に気候寒冷化）。日本＝寛永飢饉（1640年代）にもかかわらず、治水と耕地拡大により人口急増期。"}, {"q": "日本の近世経済における17世紀と18世紀の成長パターンの違いは。", "a": "17世紀＝耕地を広げる外延的拡大。18世紀＝人口が停滞するなかで1人当たりGDPが漸増。"}, {"q": "18世紀の実質賃金の国際比較で、日本（畿内農村）はどの水準にあったか。19世紀には何が起こるか。", "a": "ロンドン農村部・イタリアなどと近似した水準にあった。19世紀にはイギリス（ロンドン）が突出していく（＝分岐）。"}], "essay": [{"q": "経済史を捉える四つの視角（段階論的把握・類型論的把握・「先進」と「後進」の相互作用論・グローバル・ヒストリーの方法）を対比し、それぞれの特徴を説明しなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>段階論：生産力と生産関係（マルクス）／市場と所有権（ノース）、単線的発展論</li> <li>類型論：多系的発展論、社会的・文化的差異、経路依存</li> <li>相互作用論：後発性の不利と優位（ガーシェンクロン）、構造的低開発（フランク）、収斂か多様化か</li> <li>グローバル・ヒストリー：欧米モデルの相対化、比較史＋関係史、ポメランツ『大分岐』</li> </ul><br><b>▸ 解答例</b><br>段階論的把握は、経済史を発展段階の系列として捉える立場であり、生産力の発展と生産関係に注目するマルクスの系譜と、市場の発展と所有権の制度整備に注目するノースの系譜がある。いずれも各国が同じ道をたどるとする単線的発展論の傾向を持つ。これに対し類型論的把握は多系的発展論の立場に立ち、「社会」的・「文化」的差異を重視する。ここでは、ある歴史的経緯がその後の事象を規定するという経路依存の概念が鍵となる。第三の「先進」と「後進」の相互作用論は、ガーシェンクロンの後発性の不利と優位（先進国市場で競争する困難と、先進技術へのただ乗りによるキャッチアップ）や、フランクの構造的低開発論のように、国際的な相互関係のなかで発展を捉え、収斂か多様化かを問う。最後にグローバル・ヒストリーの方法は、国民国家や産業革命といった欧米モデル自体を相対化し、比較史と関係史を組み合わせる試みであり、ポメランツ『大分岐』が代表例である。"}, {"q": "実質1人当たりGDPが経済発展の長期比較の指標として用いられる理由を説明したうえで、近世以前にさかのぼる歴史推計に伴う限界と、代替指標について論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>人口調整（1人当たり）・物価調整（実質化）・通貨価値調整（国際比較）の必要</li> <li>Maddison Projectによる長期推計（1870〜2010年）</li> <li>近世以前は統計データの制約→GDP歴史推計の問題</li> <li>代替指標としての実質賃金とその限界（賃金労働者の比重、国際比較の方法論）</li> </ul><br><b>▸ 解答例</b><br>経済発展の水準を時代や国を超えて比較するには、経済規模を人口で調整し（1人当たり）、物価変動の影響を除去し（実質化）、さらに国際比較にあたっては各国通貨の価値の相違を調整する必要がある。この条件を満たすのが実質1人当たりGDPであり、Maddison Projectは1870年から2010年に至る各国の長期推計を提供している。しかし生産統計が整備される以前の近世にさかのぼると、GDPの歴史推計は統計データの問題を免れない。そこで生産統計の整備以前でも利用可能な指標として実質賃金が用いられ、消費バスケットによる実質化を通じて、18世紀にはロンドン農村部・イタリア・畿内農村が近似した水準にあったことなどが示されている。ただし実質賃金にも、社会全体に占める賃金労働者の比重が時代・地域で異なる点や、国際比較の方法論をめぐる課題という限界がある。"}]}, {"title": "第1講 近世東アジア世界と日本", "sub": "", "qa": [{"q": "16世紀の明の対外貿易政策と、正規の貿易の形式は何か。", "a": "民間の海上貿易を禁じる「海禁」政策。正規の貿易は勘合（割符）を用いた朝貢貿易に限られた。"}, {"q": "海禁体制の「隙間」を埋めた二つの担い手は。", "a": "後期倭寇による密貿易と、新たな仲介者として参入したポルトガル・スペインなどのヨーロッパ勢力。"}, {"q": "灰吹法とはどのような技術か。どこから伝わり、どこに導入され、どこへ普及したか。", "a": "鉛を使って銀を精錬する技術。朝鮮から伝わり石見銀山に導入され、佐渡（新潟）・生野（兵庫）・院内（秋田）など列島各地へ普及した。"}, {"q": "1580〜1640年の日本は、世界銀生産・中国の銀需要においてどれほどの比重を占めたか。", "a": "世界銀生産の約28％を占め、中国の銀需要のおよそ半分を供給した。銀は中国周辺国を経由して中国へ流れ込んだ。"}, {"q": "日本銀が中国に必要とされた背景にある、中国の貨幣制度の転換とは。", "a": "貨幣制度を銅銭中心から銀中心へ転換させつつあり、大量の銀を必要としていた。"}, {"q": "同時期の日本国内の貨幣・財政制度の転換を二つ挙げよ。", "a": "輸入銭依存から金・銀・銭の三貨制度への移行。年貢把握の貫高制（銭換算）から石高制（米の量）への転換。"}, {"q": "近世日本の貿易額は国内経済に対しどの程度の規模だったか。", "a": "全国石高の約10％（米価換算で約200万石）に相当し、貿易依存度としてかなり大きかった。"}, {"q": "ヨーロッパ人によるアジア物産の買い付けは、ヨーロッパに何を生んだか。対価は何だったか。", "a": "香辛料や茶・綿・絹・陶磁器などが「消費社会」の誕生を促した。対価は銀であり、これが「新大陸」の銀山開発を後押しした。"}, {"q": "豊臣秀吉の対外政策を年号つきで二つ挙げよ。朝鮮出兵の帰結は。", "a": "バテレン（宣教師）追放令（1587年）、海賊禁止令（1588年、海域の「惣無事」の推進）。朝鮮出兵（1592〜98年）は全面撤退に終わった。"}, {"q": "糸割符制度とは何か。", "a": "幕府が最初に生糸（白糸）を仕入れる権利を握る制度。徳川政権による貿易管理の一環。"}, {"q": "「鎖国」体制下で開かれていた「4つの口」をすべて挙げよ。", "a": "長崎、薩摩（琉球経由）、対馬（朝鮮経由）、松前（蝦夷地経由）。オランダからは年1度「オランダ風説書」で海外情報も得ていた。"}, {"q": "「鉱山資源の枯渇」の正確な意味は何か。それは何につながったか。", "a": "資源が物理的に尽きたのではなく、当時の技術では採掘できなくなったこと。銀の流出抑制策と、アジア物産の輸入代替の原動力につながった。"}, {"q": "輸入代替の進め方について、日本とヨーロッパ（イギリス）の違いは。", "a": "日本は紡糸・織布といった加工部門への特化から入ったのに対し、イギリスは原料生産部門を起点として移植・定着を図った。"}, {"q": "近世初期の開放的対外関係が残した技術の遺産を4つ以上挙げよ。", "a": "鉄砲（ヨーロッパ）、灰吹法・南蛮吹き（銀・銅精錬）、磁器（有田・朝鮮人陶工）、織機・織技法（西陣の高級呉服生産へ）、綿種と綿作（木綿の普及）。"}], "essay": [{"q": "16世紀前半の石見銀山への技術導入がもたらした経済史的な意義を、東アジア世界および日本経済への影響を踏まえて論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>朝鮮からの灰吹法の導入→石見銀山の開発、列島各地（佐渡・生野・院内）への技術普及</li> <li>東アジアへ：中国の銀需要（銅銭→銀への貨幣制度転換）への供給者に。世界銀生産の約28％、中国需要の半分</li> <li>ヨーロッパのアジア物産買い付け（消費社会）・新大陸銀とならぶグローバル経済成立の一角</li> <li>日本経済へ：三貨制度の確立、貫高制→石高制、貿易依存度約10％、鉱山開発の刺激</li> <li>やがて枯渇→輸入代替・技術導入の土台へ</li> </ul><br><b>▸ 解答例</b><br>16世紀前半、朝鮮から伝わった銀精錬技術である灰吹法が石見銀山に導入されたことで、日本の銀生産は飛躍的に拡大し、その技術は佐渡・生野・院内など列島各地の鉱山へ普及した。当時の中国は貨幣制度を銅銭中心から銀中心へ転換させつつあり、大量の銀を必要としていた。日本は1580〜1640年に世界銀生産の約28％を占め、中国の銀需要のおよそ半分を供給する「銀の供給者」として東アジア経済に組み込まれた。この銀はまた、アジア物産を買い付けるヨーロッパ勢力の対価需要とも結びつき、新大陸銀とともに16世紀のグローバル経済成立の一角を担った。国内では、銀の産出と流通を背景に金・銀・銭の三貨制度が整えられ、年貢把握も貫高制から石高制へ移行するなど、財政・貨幣制度の再編が進んだ。貿易額は全国石高の約10％に達し、生糸など輸入品への対価として鉱山開発がさらに刺激された。やがて銀・銅の産出が技術的限界により減少すると、その資源制約が綿製品・生糸・砂糖・陶磁器などアジア物産の輸入代替を促し、近世日本の産業発展の出発点となった。石見銀山への技術導入は、日本を世界経済に接続すると同時に、国内の制度と産業の近世的編成を導いた点に経済史的意義がある。"}, {"q": "近世日本における鉱山資源の「枯渇」が、その後の日本経済の展開に与えた影響を、輸入代替と技術導入の観点から論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>「枯渇」＝当時の技術での採掘限界。銀・銅の流出抑制へ</li> <li>対価を払えない→アジア物産（綿製品・生糸・砂糖・陶磁器）の輸入代替が原動力に</li> <li>開放期に導入された技術（磁器・織機・綿作など）が輸入代替の基盤</li> <li>日本は加工部門（紡糸・織布）への特化から参入。ヨーロッパとの対抗の共通基盤</li> </ul><br><b>▸ 解答例</b><br>近世日本が貿易の対価として支払い続けた銀・銅は、17世紀後半には産出が減少に向かった。これは資源が物理的に尽きたのではなく、当時の技術では採掘が困難になったという意味での「枯渇」である。幕府は銀の流出抑制に向かい、貿易は縮小へ向かったが、この資源制約は逆に、従来輸入に依存していたアジア物産――綿製品・生糸・砂糖・陶磁器――を国内で生産しようとする輸入代替の原動力となった。その基盤となったのが、開放的対外関係の時代に導入されていた技術である。朝鮮人陶工による有田の磁器、西陣に定着した織機・織技法、綿種と綿作の導入などが、国産化の受け皿を提供した。日本の輸入代替は紡糸・織布などの加工部門への特化から始まった点に特徴があり、原料生産部門を起点としたイギリスとは対照的である。同時に、アジア物産をめぐってヨーロッパと共通の対抗基盤に立ったことは、後の開港後の国際競争の前提となった。つまり鉱山資源の「枯渇」は、単なる衰退ではなく、輸入代替と技術定着を通じて近世日本の産業的厚みを生み出す転機であった。"}]}, {"title": "第10講 家族と経済", "sub": "", "qa": [{"q": "家族・世帯が経済主体であるといえる三つの側面は。", "a": "労働供給の主体、消費の主体、相続（遺産動機）を通じた資本移動の主体。"}, {"q": "北西ヨーロッパ型の結婚・世帯形成の特徴（新居制）を説明せよ。", "a": "新居制（ネオ・ローカリズム）＝結婚が親の世帯からの独立を条件とする形態。一組の夫婦とその子供からなる核家族を形成する。"}, {"q": "新居制のもとで人口増大の鍵となったものは何か。", "a": "土地以外の就業機会の外部からの供給。都市商人による農村工業の編成がその機会を提供した（フランドル・モデル）。"}, {"q": "中世前期の「屋敷地共住集団」とはどのようなものか。相続形態は。", "a": "有力農民（名主）の大規模経営のもと、屋敷地の中に非血縁者や親類縁者を含む複数の核家族が居住する集団。分割相続を伴った。"}, {"q": "中世後期に単独相続への移行が始まった契機は。", "a": "河川中流域の開発が限界に達し、地侍・有力農民に「家」観念が浸透したこと。"}, {"q": "肥後国合志郡10組（1633年）の世帯構成の特徴を数字で述べよ。", "a": "一世帯平均6.6人で、血縁家族4.22人に加え名子・下人ら非血縁家族2.43人を含んだ。畑作地の竹迫では非血縁5.82人と血縁を上回る例もあった。"}, {"q": "近世の家族形態を支えた制度的基盤は何か。", "a": "石高制。本百姓体制の成立によって農民間で耕作権が保障された。"}, {"q": "小農経営の生産基盤を支えた二つの技術要素は。", "a": "肥料投入（刈敷＝山野の草木・葉）と、鉄製の備中鍬の普及による人力・深耕の耕起労働。労働多投型農法で家族労働との適合性が高かった。"}, {"q": "「勤勉革命（industrious revolution）」論の提唱者と内容は。", "a": "速水融。家族間の協業と広義の「相続」権（家族員の成果への潜在的請求権）のもと、頑張った分だけ収入が増えるため労働を増やすインセンティブが働いた、とする議論。"}, {"q": "日本で単独相続が農村で一般化したのはいつ頃で、その背景は。", "a": "耕地面積の拡大が止まった17世紀末から18世紀初め頃。フロンティアの消滅により土地を相続で分けられなくなったため。"}, {"q": "社会制度としての「家」を構成する要素は。どの史料に記録されるか。", "a": "家業・家産と祖先祭祀権が一体となったもの（直系家族）。宗門改帳に記録されている。"}, {"q": "近代に入っても続いた家族労働配分の例（鳥取県・1918年）を説明せよ。", "a": "自作農の世帯で、戸主・妻・父・母・長女らが農耕・養蚕・畳表製造・藁製品と家事・公共事業に、性別・年齢・能力に応じて労働時間を配分していた。"}, {"q": "この講の結論として、現代の核家族モデルはどう位置づけられるか。", "a": "決して普遍的ではなく、歴史性・地域性を持つ。家族形態は経済動態と相互に規定し合いながら変化してきた。"}], "essay": [{"q": "北西ヨーロッパの「新居制」と日本の「家」を対比し、家族形態と経済動態の関係について論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>新居制＝結婚と同時に独立世帯・核家族。独立には土地以外の就業機会が必要→農村工業の編成→人口増大</li> <li>日本＝直系家族の「家」。単独相続、家業・家産・祖先祭祀の一体化</li> <li>小農経営と労働多投型農法が家族労働と適合、勤勉革命</li> <li>家族は労働供給・消費・資本移動の主体。経済が社会を、社会が経済を規定する双方向の関係</li> </ul><br><b>▸ 解答例</b><br>北西ヨーロッパの家族は、結婚が親の世帯からの独立を条件とする新居制のもとにあり、一組の夫婦とその子供からなる核家族を形成した。独立には土地以外の就業機会が必要だったため、都市商人による農村工業の編成が結婚と人口増大を左右する鍵となった。これに対し日本では、中世前期の屋敷地共住集団と分割相続から出発し、耕地拡大が止まった17世紀末から18世紀初めにかけて単独相続が農村で一般化して、家業・家産と祖先祭祀権が一体となった社会制度としての「家」（直系家族）が成立した。その基盤には、石高制と本百姓体制による耕作権の保障、そして刈敷や備中鍬による労働多投型農法と家族労働の高い適合性があった。家族員の労働成果に対する潜在的な請求権が労働のインセンティブとなり、速水融のいう勤勉革命として労働供給を増大させた。家族・世帯は労働供給・消費・相続を通じた資本移動の主体であり、その形態の違いは経済発展の型そのものを規定した。両者の対比は、経済が社会を規定すると同時に社会が経済を規定するという双方向の関係を示しており、現代の核家族モデルが普遍的でなく歴史性・地域性を持つことを教えてくれる。"}, {"q": "17世紀末から18世紀初頭にかけて日本の農村で単独相続が一般化した背景を、土地制約と小農経営の展開を踏まえて論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>17世紀の外延的拡大（耕地開発・人口急増）とその終焉＝フロンティアの消滅</li> <li>石高制・本百姓体制による耕作権保障→小農経営の自立・分家化</li> <li>これ以上土地を分割できない→分割相続から単独相続へ</li> <li>「家」（家業・家産・祖先祭祀の一体）の成立、直系家族</li> </ul><br><b>▸ 解答例</b><br>17世紀の日本は治水工事と耕地面積の大幅な拡大による外延的拡大の時代であり、人口も急増した。石高制と本百姓体制の成立により農民間で耕作権が保障され、名子・下人を含む複合的な世帯から小農経営の自立と分家化が進行した。小農経営は、刈敷などの肥料投入と備中鍬による深耕という労働多投型農法に支えられ、家族労働との適合性が高かった。しかし17世紀末になると河川開発や耕地拡大が限界に達し、フロンティアが消滅する。外延的拡大が終焉した以上、相続のたびに土地を分割すれば経営は成り立たなくなるため、分割相続に代わって単独相続が選択されるようになった。こうして家業・家産と祖先祭祀権が一体となった社会制度としての「家」が成立し、宗門改帳に記録されるような直系家族の形態が定着した。単独相続の一般化は、土地制約という経済的条件に対する家族制度の側の適応であり、家族形態と経済動態が相互に規定し合う関係をよく示している。"}]}, {"title": "第8講 資源と環境", "sub": "", "qa": [{"q": "人口圧の高まりが農業に与える二つの圧力と、それへの対抗策は。", "a": "1人当たり経営面積の減少と、限界地への耕地拡大による土地生産性の低下。対抗するには土地生産性を上げる多投型農法（労働と肥料の多投）が必要となる。"}, {"q": "草肥の三つの形態を説明せよ。", "a": "刈敷（柴や草をそのまま鋤き込む）、堆肥（積み重ねて腐らせる）、厩肥（厩舎に敷いて牛馬の糞尿と混ぜる）。"}, {"q": "信濃松本領の例で、耕地50町歩の村に必要とされた山地の面積は。", "a": "500〜600町歩。水田1反に刈敷15〜35駄を要し、薪炭も農家1戸あたり20〜30駄が必要だった。"}, {"q": "草山が形成されるメカニズムは。あわせて17世紀に起きた資源問題を挙げよ。", "a": "草の採取が続くと自然遷移（森林化）が抑制され草山が形成される。17世紀には城下町建設による林産資源の費消、耕地と草刈場の競合、洪水・土砂災害、山論の頻発が起きた。"}, {"q": "「陸から海へ」とは何を指すか。代表的な金肥を挙げよ。", "a": "草肥制約への対応としての金肥（購入肥料）の導入。油粕（菜種油の副産物）と魚肥＝イワシの干鰯・鰮〆粕、ニシンの胴鰊・鰊粕。"}, {"q": "鰊粕の生産を支えた地域と流通ルートは。", "a": "蝦夷地。本州の資本とアイヌ民族の労働力を用いる場として重要になり、北前船ルートが盛行した（肥料の地域的分業）。"}, {"q": "都市の屎尿はどのように流通したか。明治後期の変化は。", "a": "人口集積により商品化され、町と農村のテリトリー取り決めのもと「家守」が集めて農村に販売した。明治後期には「Goods」から「Bads」（都市行政が処理すべき廃棄物）へ転じた。"}, {"q": "全国平均の反収（土地生産性）は1600年から1872年にどう変化したか。", "a": "0.96石から1.45石へ緩やかに上昇した。"}, {"q": "開港後に増大した輸入肥料と、その供給地・関連する対外展開は。", "a": "大豆粕。1902年の肥料輸入で最大の品目で、主要輸入先は中国（満洲）。「海から陸へ」の展開であり、満鉄など東アジア進出とも関係した。"}, {"q": "1926年のヘクタール当たり人造肥料施用量の国際比較における日本の特徴は。", "a": "窒素・リン酸で突出して多く、きわめて肥料集約的な農業だった。"}, {"q": "ヨーロッパの有畜農業の特徴を、日本の小農農業と対比して述べよ。", "a": "相対的に広い土地（標準的保有地10ヘクタール前後）と低い土地生産性。三圃制のもと休耕地にマメ科作物を輪作し、家畜（live stock）が耕起・堆肥・運搬を担う資本として決定的に重要だった。"}, {"q": "ポメランツの大分岐論の主張の骨子は。", "a": "ヨーロッパとアジア（イギリスと揚子江下流デルタ）は18世紀まで技術・生活水準が均質だったが、その後分岐した。19世紀の分岐をもたらしたのは、海外で生活必需品を生産して国内の土地制約を緩めた生態系・資源制約の突破である。"}, {"q": "ghost acreage とは何か。具体例を挙げよ。", "a": "海外の未開拓の土地、いわば「見えない耕地」。新大陸での綿作が羊毛を代替し、カリブ海諸島のプランテーションの砂糖が食材を供給した（奴隷移入・北米穀物生産と結合）。"}, {"q": "イギリスの石炭利用を左右した条件は。", "a": "輸送費の問題から消費地との近接性が鍵。採掘コスト（資源賦存状態）や蒸気機関排水ポンプとの相互作用にも左右された。木炭から石炭への転換が生活用と製鉄業を支えた。"}, {"q": "この講のまとめとして、土地制約と経済成長の関係はどのようなサイクルで捉えられるか。", "a": "拡大→生態系の制約→対応、というサイクル。制約を緩和したのは水産資源・海外のghost acreage・鉱物資源であり、その先には新たな資源制約（エネルギー・水・鉱物）が待ち受ける。"}], "essay": [{"q": "近世日本の農業における肥料調達の変遷を、「資源制約とその緩和」という観点から論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>労働・肥料多投の小農技術と草肥（刈敷・堆肥・厩肥）→広大な山地が必要、草山・山論</li> <li>「陸から海へ」＝金肥（干鰯・〆粕・鰊粕）の導入、蝦夷地・北前船、屎尿の商品化</li> <li>開港後「海から陸へ」＝大豆粕輸入（満洲）、反収の上昇（0.96石→1.45石）</li> <li>制約→対応の反復。最終的には人造肥料へ（1926年、世界屈指の施肥量）</li> </ul><br><b>▸ 解答例</b><br>近世日本の小農経営は、水田裏作・深耕とならぶ柱として肥料の多投に依存したが、その調達は常に資源制約と向き合っていた。当初の肥料は刈敷・堆肥・厩肥といった草肥であり、その原料採取には耕地の10倍規模の山地を要した。人口増大と耕地拡大、城下町建設による林産資源の費消はこの制約を深刻化させ、草山の形成や山論の頻発を招いた。これに対する第一の対応が「陸から海へ」、すなわち金肥の導入である。イワシの干鰯・〆粕は関西から関東へ広がり、ニシンの鰊粕は本州の資本とアイヌの労働力による蝦夷地の漁業と北前船ルートに支えられ、肥料の地域的分業が成立した。都市では屎尿が商品化され、農村への販売網が形成された。開港はさらに「海から陸へ」の展開をもたらし、満洲を中心とする大豆粕の輸入が増大して、1902年には肥料輸入の最大品目となった。この間、反収は1600年の0.96石から1872年の1.45石へ上昇し、明治期以降は人造肥料の導入によって、1926年には窒素・リン酸の施用量で世界的に突出する肥料集約的農業が成立した。肥料調達の歴史は、拡大→生態系の制約→対応というサイクルを繰り返しながら、制約の緩和先を山野から海へ、さらに海外へと広げていく過程であった。"}, {"q": "ポメランツの「大分岐」論の主張を説明し、19世紀にヨーロッパとアジアが分岐した要因について論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>18世紀までイギリスと揚子江下流デルタは技術・生活水準で均質</li> <li>分岐の要因＝生態系・資源制約の突破（海外での生活必需品生産）</li> <li>新大陸のghost acreage：綿が羊毛を、砂糖が食材を代替。奴隷貿易・北米穀物と結合</li> <li>石炭：木炭からの転換、生活用・製鉄業。賦存と近接性</li> <li>グローバル・ヒストリーの方法（欧米モデルの相対化）としての意義</li> </ul><br><b>▸ 解答例</b><br>ポメランツの大分岐論は、ヨーロッパとアジア、具体的にはイギリスと揚子江下流デルタ地域が、18世紀までは技術水準・生活水準の点でおおむね均質だったとし、両者の分岐を19世紀に求める議論である。ヨーロッパの先進性を所与とする従来の見方を退け、分岐の要因を生態系・資源制約の突破に見出した点に特徴がある。近世のヨーロッパも人口増大と土地制約、繊維原料としての牧羊と食料生産の競合、エネルギー源としての森林枯渇に直面していた。これを緩めたのが「新大陸」であった。海外のghost acreage（見えない耕地）において、綿作が国内の羊毛生産を代替し、カリブ海のプランテーションが砂糖を供給した。それはアフリカからの奴隷移入と北アメリカの穀物生産と結びついた大西洋経済の構造であり、国内の土地を工業用・食料用に振り向けることを可能にした。加えて、木炭から石炭への転換が暖房・煮炊きと製鉄業のエネルギー制約を解き、蒸気機関との相互作用のなかで工業化を支えた。つまり大分岐は、ヨーロッパ内在的な優越ではなく、広大な土地・家畜・石炭という資源条件と海外資源の動員によってもたらされたのであり、欧米モデルを相対化するグローバル・ヒストリーの代表的試みとなっている。"}]}, {"title": "第9講 近世日本の市場・産業と技術", "sub": "", "qa": [{"q": "近世初期の経済を規定した領主の需要を三つ挙げよ。", "a": "軍事行動・軍役（軍事的動員・示威行動）、城下町建設（御手伝普請による城郭建設・市街地整備）、「社会資本」形成（治水・利水の河川工事、年貢廻送の港湾整備）。"}, {"q": "初期豪商の系譜と、備えていた機能は。", "a": "「座」商人や貿易商の系譜。資本調達力・情報収集力・輸送手段（船・伝馬）・保管手段（蔵）を備え、御用として呉服師、河川工事請負、材木調達、年貢米販売を担った。"}, {"q": "経済の軸は何から何へ移ったか。その舞台は。", "a": "「軍役」から都市での「消費」支出へ。参勤交代と江戸滞在、幕府の寺社造営（5代綱吉）が舞台となり、社交と政治が交わった（江戸留守居役が象徴）。"}, {"q": "江戸の人口はどう推移したか。他の都市人口もあわせて。", "a": "江戸は43万人から18世紀半ばに100万人へ。地方領国の城下町で計140万人、畿内（京都・大坂など）で計80万人（1650年頃）。"}, {"q": "佐賀藩の財政支出（1650年代）の特徴は。", "a": "支出の6割超が領外支出で、その多くは江戸藩邸関連だった。"}, {"q": "越後屋（三井家）の商法の革新とは何か。従来の商法との違いは。", "a": "「現金安売無掛値」＝主に庶民向けの現金取引。大名・旗本相手の注文販売・代金後払いと対照的。江戸店の奉公人は1673年の10人余から1710年164人へ急拡大し、両替店も併設した。"}, {"q": "大坂の集散地機能を、移入品・移出品の例で説明せよ。", "a": "菜種・干鰯・白木綿・木綿などを移入し、菜種油・縞木綿・繰綿・醤油・油粕などを移出した。原料を集めて加工品を送り出す加工・中継の役割。"}, {"q": "上方―江戸間の流通を確立した組織と輸送手段は。", "a": "十組問屋の成立と菱垣廻船。海難への集団的対応策として仲間（同業組織）が結成された（楽市楽座政策が前提）。"}, {"q": "消費文化の拡散をよく示す流通は何か。その供給源と普及の方向は。", "a": "古着流通。供給源は質流れや市中の買い集め。上層から中層へ、大都市から中小都市へ、そして農村部へと普及した。"}, {"q": "西陣からの技術流出の契機を二つ挙げよ。西陣側の対応は。", "a": "西陣焼け（1788年の大火災）で焼け出された「強制的」移動と、技術を活かすための自発的移動。西陣は熟練工の移動を禁じ、違反者は仲間組織への加入を認めなかった。"}, {"q": "百姓の実質的な年貢負担が軽くなった理由は。", "a": "年貢賦課率の下落・停滞と村高の固定化が進むなかで土地生産性が上昇したため。"}, {"q": "「都市経済の停滞」とはどのような現象か。", "a": "経済発展が胎動するなか、人口密度は上昇したのに都市化率はむしろ低下した現象。農業効率の上昇で農村人口が増える一方、大坂の入津量減少など中央市場・有力都市商業資本は停滞した。"}, {"q": "新興集散地問屋論とは何か。代表例を二つ挙げよ。", "a": "大阪中心ではなく地方の問屋が農村部の流通を担ったという議論。丁子屋小林吟右衛門家（近江商人、天保期に集散地問屋化し関東・東北へ販路拡大）と伊藤忠兵衛（幕末に大坂進出、西日本に販路）。"}, {"q": "近世綿業の二段階の展開を説明せよ。", "a": "第一段階＝16世紀の綿花栽培移植と17世紀の綿作全国普及（綿布の自家生産による衣料生産の労働節約→小農家族経済の成立促進）。第二段階＝近世中・後期の繰綿の商品化、さらに綿糸・綿布の商品化（農業の商品経済化と農村工業の発展）。"}, {"q": "農村綿織物業の事例として挙げられる地域と、その特徴は。", "a": "和泉地方（大阪府下）。白木綿生産が発展し幕末〜明治期に有数の生産地となった。宇多大津村の職業分化、在地の仲買商と綿糸商、担い手としての農家が見られた。"}], "essay": [{"q": "近世日本の経済の重心が「領主需要」から「都市消費」へと移行した過程を、それを担った商人のあり方の変化に言及しつつ論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>初期＝軍役・城下町建設・社会資本形成という領主需要、初期豪商の「御用」</li> <li>参勤交代・江戸滞在→都市人口の急増（江戸100万人）、領外支出（佐賀藩6割超）</li> <li>越後屋の「現金安売無掛値」＝庶民向け市場の成立</li> <li>大坂の集散地機能、十組問屋・菱垣廻船</li> <li>消費文化の下方・地方への拡散（古着流通）</li> </ul><br><b>▸ 解答例</b><br>近世初期の経済は、軍役、御手伝普請による城下町建設、治水・港湾といった社会資本形成など、領主の需要に大きく規定されていた。これに応えたのが、座商人や貿易商の系譜を引き、資本力・情報力・輸送保管手段を備えた初期豪商であり、彼らは呉服師や河川工事請負などの「御用」を通じて流通者かつ供給者として活動した。やがて平和の定着とともに経済の軸は軍役から都市での消費支出へ移る。参勤交代と江戸滞在がその舞台となり、江戸の人口は43万人から18世紀半ばには100万人に達し、佐賀藩では支出の6割超が江戸藩邸を中心とする領外支出で占められた。この都市市場の変化に対応したのが商人のあり方の転換である。越後屋は、大名・旗本相手の注文販売・代金後払いに代えて、庶民向けの現金取引「現金安売無掛値」を打ち出して急成長した。大坂は菜種や綿を集めて加工品を送り出す全国的集散地となり、十組問屋と菱垣廻船が上方―江戸ルートを確立した。さらに消費文化は、古着流通に典型的に見られるように、上層から下層へ、都市から農村へと拡散した。こうして領主の需要に依存した経済から、都市と庶民の消費に支えられた市場経済へと、近世日本の経済構造は転換していったのである。"}, {"q": "18世紀後半以降の「都市経済の停滞」の内実を、所得配分の変容と農村側の発展を踏まえて論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>年貢賦課率の下落・停滞＋村高の固定化＋土地生産性上昇→農村に余剰蓄積</li> <li>人口密度上昇と都市化率低下の併存</li> <li>大坂入津量の減少、中央市場・有力都市商業資本の停滞</li> <li>担い手の交代：農村工業（和泉白木綿など）と新興集散地問屋（丁子屋・伊藤忠兵衛）</li> <li>「停滞」は衰退ではなく発展の重心移動</li> </ul><br><b>▸ 解答例</b><br>18世紀後半以降の日本では、経済発展が胎動していたにもかかわらず、都市化率はむしろ低下するという逆説的な現象が見られた。その背景には所得配分の変容がある。年貢賦課率が下落・停滞し、村高が固定化される一方で土地生産性は上昇したため、百姓から見た実質的な年貢負担は軽くなり、余剰が農村の側に蓄積されるようになった。農業効率の上昇は農村人口を増加させ、人口密度は上昇したが、都市部の人口は伸び悩んだ。19世紀前半の大坂では米・実綿・繰綿・白木綿などの入津量が軒並み減少し、中央市場としての大坂、そして有力都市商業資本の停滞が明らかになった。しかしこれは経済全体の衰退ではない。綿業では繰綿・綿糸・綿布の商品化が進んで和泉の白木綿のような農村工業が発展し、流通面では、近江商人の丁子屋小林吟右衛門家が天保期に集散地問屋化して関東・東北へ販路を広げ、伊藤忠兵衛が幕末に大坂へ進出するなど、農村部の流通を担う新興集散地問屋が台頭した。すなわち「都市経済の停滞」の内実は、市場に新たな担い手が現れたことによる発展の重心の農村への移動であり、近代の在来的発展の基盤が形成される過程でもあった。"}]}, {"title": "第6講 産業革命と大分岐", "sub": "", "qa": [{"q": "産業革命の前提を三つ挙げよ。", "a": "グローバルな展開による資源制約の克服、アジア貿易による資本蓄積、アジア・アフリカ・アメリカにおける植民地獲得。"}, {"q": "N.クラフツによるイギリス工業化の成長の特徴づけは。", "a": "経済成長率そのものはそれほど高くなかった。むしろ綿工業・製鉄業、交通（汽船・鉄道）といった特定産業の飛躍に特徴があった。"}, {"q": "「キャラコ」禁止令が出された背景は。", "a": "東インド会社を通じてインド綿布（キャラコ）が流入したことに対する、重商主義政策のもとでの国内産業保護。当時のインドは綿作と職人的生産（紡糸・織布・捺染）で優れていた。"}, {"q": "紡績・織布の主要発明を、発明者・年代とともに順に挙げよ。", "a": "飛び杼（ジョン・ケイ、1733）→ジェニー紡績機（ハーグリーブス、1760年代）→水力紡績機（アークライト、1769）→ミュール紡績機（クロンプトン、1770年代）→力織機（カートライト、1785）。"}, {"q": "ミュール紡績機の技術的特徴は。", "a": "ジェニー紡績機の機構と水力紡績機のローラーを組み合わせ、細くて強い糸を量産できるようにした。"}, {"q": "蒸気機関の系譜を説明せよ。もともとの用途は。", "a": "もともとは炭坑用の排水ポンプ。セイヴァリの特許（1698、サイフォン式）→ニューコメン（1712、シリンダ内のピストン運動）→ワット（1769、燃料節約の機構、往復運動を回転運動に変換）と進化し、機械運転の動力となった。"}, {"q": "産業革命の「核心」とされる結合は何か。", "a": "作業機（紡績機・織機）と動力機（蒸気機関）の結合。"}, {"q": "産業革命期の発明家の出自の特徴は。何と対照的か。", "a": "熟練職人によるものだった（ハーグリーブス・クロンプトンは紡績工、アークライトは仕立屋の息子、ワットは船大工の息子）。19世紀後半の化学・電気産業が高等教育機関と結びついていたのと対照的。"}, {"q": "機械採用の条件式を書き、各記号の意味を述べよ。", "a": "（J＋TM）＜ DWT のときに機械が採用される。J＝機械購入価格、T＝耐久年数、M＝年間維持費、D＝年間労働節約日数、W＝賃金。機械の性能と労賃水準の相対関係で採否が決まる。"}, {"q": "ロバート・アレンが挙げる「なぜイギリスだったのか」の条件を三つ。", "a": "①高賃金（労働節約的技術に意味が生まれる）②低いエネルギー価格（安価な石炭が蒸気機関を後押し）③機械の初期費用の増大が生む規模の経済。フランスでジェニー紡績機の普及度が低かったのは賃金・エネルギー価格の条件が違ったため。"}, {"q": "J.モキイアの「有用な知識」の二類型を説明せよ。", "a": "オメガ型知識（命題的知識＝科学、whatの発見）とラムダ型知識（指図的知識＝技術、howの発明）。オメガ型知識の共有によってラムダ型知識が持続的に創造されるようになった（「産業的啓蒙」）。"}, {"q": "ヨーロッパの知識交流を支えた場を二つ挙げよ。日本近世への問いは。", "a": "「学問の共和国」に集う知的エリートの交流と、職人間の交流（ギルドの技能養成・技術交流、職人の遍歴）。「汎アジアの知識・技能の共有」はあったか――鎖国・海禁がそれを妨げたのではないか、という問いが投げかけられる。"}, {"q": "産業革命後のイギリス綿業のアジア進出は、インドと日本に何をもたらしたか。", "a": "かつて世界最強だったインドの綿紡績はイギリスに従属的な立ち位置へ転落（イギリスからの技術移転による綿紡績業）。日本には開港と綿製品輸入をもたらした。"}], "essay": [{"q": "なぜ産業革命はイギリスで起こったのか。機械採用の条件式（J＋TM）＜DWT とロバート・アレンの議論を踏まえて論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>採用条件式の意味：機械費用と労働節約価値の比較</li> <li>高賃金（W大）→労働節約的機械の採用が有利に</li> <li>安価な石炭（エネルギー価格低）→蒸気機関の稼働費用低下</li> <li>初期費用の増大→規模の経済（水力紡績機・蒸気機関の大型性）</li> <li>対比：フランスではジェニー紡績機の普及度が低かった</li> </ul><br><b>▸ 解答例</b><br>機械を採用するか否かは、経営者にとって機械の費用が労働費用の節約に見合うかで決まる。これを定式化したのが（J＋TM）＜DWT であり、機械購入価格Jと耐久年数分の維持費TMの合計が、年間労働節約日数D×賃金W×耐久年数Tを下回るときにのみ機械は採用される。すなわち機械化は技術の優劣だけでなく、機械の性能と労賃水準の相対的な関係に依存する。ロバート・アレンによれば、18世紀イギリスはこの条件を満たす特異な要素価格構造を持っていた。第一に賃金が高く、右辺のWが大きいため、紡績機械のような労働節約的技術に採算が生まれた。第二にエネルギー価格が低く、生活燃料需要を背景に発達した炭鉱から安価な石炭が供給され、蒸気機関の運転費用を引き下げた。第三に、ジェニー紡績機から水力紡績機・ミュール紡績機へと機械の初期費用が増大したことは、大規模工場に規模の経済をもたらした。同じ機械が利用可能であっても、賃金が低くエネルギーが高いフランスではジェニー紡績機の普及度が低かったことは、この要素価格説を裏付ける。産業革命がイギリスで起こったのは、発明の才が英国民に固有だったからではなく、高賃金と安価な石炭という条件が機械の発明を採算に乗せ、その持続的改良を促したからである。"}, {"q": "産業革命期の技術発明を支えた知識と人的基盤について、モキイアの「産業的啓蒙」論に言及しつつ説明しなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>基盤としての科学革命：学問を有用な知識とみなす見方</li> <li>オメガ型知識（科学・what）とラムダ型知識（技術・how）の相互関係</li> <li>「学問の共和国」の知的エリート交流、ギルド・職人の遍歴</li> <li>発明の担い手は熟練職人（現場の問題意識）</li> <li>「汎ヨーロッパの知識・技能の共有」vs 鎖国・海禁下のアジア</li> </ul><br><b>▸ 解答例</b><br>産業革命期の技術開発の基盤には科学革命があり、学問を有用な知識とみなす見方や、知的エリートによる科学への取り組みが広がっていた。モキイアはこれを「産業的啓蒙」と呼び、有用な知識を、whatを発見する命題的知識（オメガ型＝科学）と、howを発明する指図的知識（ラムダ型＝技術）の二類型に整理した。重要なのは両者の相互関係の形成であり、オメガ型知識が共有されることで、ラムダ型知識が一回限りでなく持続的に創造されるようになった点に、この時代の画期性がある。知識の共有は二つの回路で進んだ。ひとつは汎ヨーロッパ的な「学問の共和国」に集う知的エリートの交流であり、もうひとつはギルドの技能養成・技術交流や職人の遍歴といった職人間の交流である。実際、発明の担い手は高等教育を受けたエリートではなく、ハーグリーブスやクロンプトンのような紡績工をはじめとする熟練職人であり、現場レベルの問題意識が機械の発明につながった。こうした「汎ヨーロッパの知識・技能の共有」に対し、では「汎アジアの知識・技能の共有」はあったのか、鎖国や海禁がそれを妨げたのではないかという問いが、日本近世との対比として投げかけられている。"}]}, {"title": "第3講 開港と日本経済", "sub": "", "qa": [{"q": "欧米勢力のアジア進出を象徴する戦争と条約は。", "a": "アヘン戦争と南京条約。日本も通商条約の締結によって「自由貿易」を開始することになった。"}, {"q": "開港時の不平等な条件を三つ挙げよ。", "a": "開港と居留地の設定、片務的領事裁判権（治外法権）、協定税率（関税自主権がない）。"}, {"q": "幕末期（1865〜67年）の輸出入の構成は。注意すべき点も。", "a": "輸出は生糸が圧倒的（1867年で約46％）で蚕卵紙・茶が続き、輸入は綿織物・毛織物が大きな比重。この段階では輸出・輸入品とも「アジア物産」が中心だった点に注意。"}, {"q": "開港が綿業に与えた「ねじれた」影響とは。", "a": "輸入綿製品の流入で在来の綿糸生産は衰退し綿作も消滅に向かったが、綿布の輸入は停滞したため綿布生産はむしろ再編・発展した。糸は輸入に押され、布は国内生産が残った。"}, {"q": "在来綿織物業が再編されえた条件を三つ挙げよ。", "a": "①内外綿製品の品質差（白木綿の厚地・薄地、和服用の先染め縞木綿など輸入品に合わない日本人の需要）②原料綿糸の輸入糸（イギリス・インド産）への転換③綿布市場の拡大（輸出産業の成長とインフレによる農村市場の拡大、自給織物・麻・古着からの移行）。"}, {"q": "開港後に生糸輸出が急増した海外要因は。", "a": "ヨーロッパで蚕の微粒子病が流行し、生糸生産が打撃を受けたこと。日本の国内絹業には打撃と新規参入促進の両面をもたらした。"}, {"q": "座繰製糸の限界とは何か。", "a": "賃挽きや座繰りといった外延的拡大には限界があり、需要の増大に追いつかず品質も安定しなかった。貿易収支がプラスからマイナスへ転じる局面も生じた。"}, {"q": "器械製糸業はどこの技術を導入したか。象徴的な工場は。競合相手は。", "a": "フランス・イタリアの製糸技術。官営富岡製糸場が象徴的意義を持つ。ヨーロッパ市場ではフランス・イタリアおよび中国の生産者と競合した。"}], "essay": [{"q": "開港が在来綿業に与えた影響を、綿糸と綿布に分けて論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>綿糸：輸入綿糸に押され在来綿糸生産は衰退、綿作も消滅へ→のち機械制紡績の移植（輸入代替）へ</li> <li>綿布：輸入停滞により再編・発展</li> <li>再編の3条件：品質差（和服需要）、輸入糸への原料転換、農村市場の拡大</li> <li>「ねじれ」の含意：在来産業の淘汰と適応の併存</li> </ul><br><b>▸ 解答例</b><br>綿業は幕末の農村経済発展の機動力だったが、開港はこれに一様でない影響を与えた。まず綿糸については、イギリス・インド産の安価な輸入綿糸が流入したことで在来の綿糸生産は衰退し、原料としての綿作も消滅に向かった。この綿糸輸入への対応は、やがて機械制綿糸紡績業の移植という輸入代替の課題へとつながっていく。一方、綿布については輸入が停滞したため、国内生産はむしろ再編されつつ発展した。それを可能にした条件は三つある。第一に内外綿製品の品質差であり、白木綿の厚地・薄地や和服用に先染めした縞木綿など、輸入品では満たせない日本人の需要が国内生産を支えた。第二に、原料綿糸を輸入糸に転換することで、良質で安価な原料を確保した。第三に、生糸輸出などの輸出産業の成長とインフレーションが農村市場を拡大させ、自給織物・麻・古着から製品購入へと消費が移り、綿布市場そのものが拡大した。このように開港は、糸は輸入に押されるが布は国内生産が発展するという「ねじれた」影響を在来綿業に与え、在来産業の淘汰と適応が併存する日本の工業化の出発点を形づくった。"}, {"q": "開港後の生糸輸出の急増から器械製糸業の勃興に至る過程を、国際市場の条件変化を踏まえて論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>微粒子病によるヨーロッパ生糸生産の打撃→日本生糸への需要急増</li> <li>座繰技術の普及・展開と、その外延的拡大の限界（量・品質）</li> <li>ヨーロッパの復活→仏伊・中国との競争激化</li> <li>器械製糸業の勃興、官営富岡製糸場の意義</li> </ul><br><b>▸ 解答例</b><br>開港後、日本の生糸輸出は急増し、1867年には輸出額の約46％を占める最大の輸出品となった。その背景には、ヨーロッパで蚕の微粒子病が流行し、フランス・イタリアの生糸生産が大きな打撃を受けたという国際市場の条件があった。急増する需要に対し、日本では座繰技術が普及・展開したが、賃挽きや座繰りといった在来技術の外延的拡大には限界があり、生産量は需要に追いつかず品質も安定しなかった。やがてヨーロッパの生糸生産が回復すると、ヨーロッパ市場ではフランス・イタリアの生産者や中国の生産者との競争が激化し、品質の劣る日本生糸は不利な立場に置かれた。この競争条件の変化への対応として勃興したのが、フランス・イタリアの製糸技術を導入した器械製糸業である。1872年設立の官営富岡製糸場は、その技術移転の象徴的意義を持った。すなわち生糸業の展開は、海外要因による偶発的な輸出ブームが、在来技術の限界の露呈と国際競争の圧力を経て、技術導入による産業の近代化へと転化していく過程であり、後の「適正技術」による製糸業発展の前提となった。"}]}, {"title": "第7講 産業革命と在来的発展", "sub": "", "qa": [{"q": "2000錘紡績とは何か。なぜ失敗したか。", "a": "綿糸輸入への輸入代替として2000錘（spindle＝紡績機械のワンセット）を輸入し、官営紡績所や政府助成の民間資本が始めた事業。技術だけを移植しても、それを受け入れる社会的基盤（機械の運転・保守・部品加工など）がなく、1870年代後半〜80年代に不採算に終わった。"}, {"q": "大阪紡績会社の設立年と規模、その後の展開は。", "a": "1883年設立、1万錘規模で出発。速やかに規模を拡大し、1880年代後半以降には数万錘規模の紡績会社が族生した。"}, {"q": "大阪紡績の大工場操業を可能にした条件を四つ挙げよ。", "a": "①株式会社制度による資本調達（渋沢栄一の機能、華族の出資と実業家・商人の追随）②昼夜二交替制による機械稼働率上昇＝資本集約的要素の緩和③賃金労働者のリクルート（都市下層→遠隔地募集）④作業工程の不熟練化。"}, {"q": "昼夜二交替制の経済史的意味は。", "a": "資本不足経済における資本節約――労働利用によって資本回転率を上げる試み。労働が豊富で資本が乏しい日本の資源賦存に適合した。"}, {"q": "紡績業で大阪という立地が持った利点は。", "a": "金属加工技術の調達による修理・保全、機械工業を中心とする関連工業の広がり、交通の発達による技術情報・サービスの入手、経営者・労働者の質という社会的技術基盤を満たした（地方立地の2000錘紡績はメンテナンスが困難だった）。"}, {"q": "綿紡績業の女性労働力比率（1897年）は。年齢構成の特徴も。", "a": "78.5％と国際的に見て高かった。11〜19歳の若年女性が大きな比重を占めた。"}, {"q": "「欧米型生産モデル」の定義と、日本における移植の論理は。", "a": "資本財に体現された製造技術と、動力源を備えた集中作業場としての工場が、一定規模のもとでセットとなった生産モデル。資本集約的で日本の資源賦存（資本が乏しく労働が豊富）には不適合だが、競争上求められる生産性と品質を他の方法で実現できない場合、参入には移植が不可避となる。"}, {"q": "1905年の織物業統計にみる生産形態の特徴は。", "a": "賃織業が戸数・織工数ともに圧倒的多数を占め、女性比率が非常に高かった（全体で88.5％）。手機（高機からバッタン＝飛び杼機へ）を用いた小規模作業場が中心。"}, {"q": "問屋制家内工業の経営側・就業側それぞれの利点は。", "a": "経営側：固定費の節約、不況時のバッファー、集中作業場への固定投資の節約、多様な取引先に応じた柔軟な品揃え、低賃金の利用可能性。就業側：就業選択の自律性（耕作の合間に織物を担う世帯内労働配分が可能）。"}, {"q": "問屋制の取引コスト問題と、その対応策は。", "a": "原料糸の着服や納期問題。対応として「原料糸歩留まり」と発注量の逆相関の把握といった管理の実践、発注先の地理的集約化、長期取引、接触頻度の増加がとられた。"}, {"q": "なぜ紡績業は工場制、織物業は問屋制となったのか。", "a": "紡績技術は資本集約的な機械に体化されていたため資本財の規定性から工場制が、織物生産技術は労働集約的だったため労働力の賦存状況（小農社会）の規定性から問屋制家内工業が選択された。生産組織の複層的展開の背景には小農社会がある。"}, {"q": "「適正技術」とは何か。製糸業での具体例を挙げよ。", "a": "導入した技術を日本の条件（小さな工場）向けにアレンジすること。フランス・イタリアの製糸技術を導入しつつ、糸繰器械を簡便化し水力を利用するなど日本向けに適用した。"}, {"q": "製糸結社の機能を四つ挙げよ。代表例は。", "a": "共同出荷・共同購繭・金融（信用力）・商標統一。代表例は開明社。煮繭の温度調整、繭の統一・管理、作業管理、フリー・ライドの排除により高いレベルの品質斉一性を実現した（アメリカの機械制絹織物業からの要請）。"}, {"q": "豊田式力織機（1896年）の特徴と価格は。輸入品との比較も。", "a": "国産の小幅・半鉄半木製力織機（木製フレーム使用）。輸入品の200〜800円に対し30〜100円と安価。機械代Jの低下と賃金Wの上昇により（J＋TM）＜DWTの採用条件が満たされた。"}, {"q": "1885〜1914年のマクロ経済指標の変化を挙げよ。", "a": "人口3800万→5200万（1800〜1875年は10％増にとどまったのと対照的）、GNPは実質2倍・1人当たり1.7倍、第二次産業の構成比は16％→32％へ倍増。繊維産業が急成長し、機械・金属・鉄鋼は高成長だが生産額は相対的に小さかった。"}, {"q": "日本の工業化の三つのパターンを、例とともに挙げよ。", "a": "①欧米型生産モデルの移植（機械制綿糸紡績業、製鉄・造船）②適正技術と生産組織（製糸業、鉱山業）③分散型生産組織と産地・集積（織物業、中小機械工業、輸出雑貨工業）。"}, {"q": "二重構造／複層的発展とは何か。解釈をめぐる諸説は。", "a": "「伝統社会」と「近代社会」、非農業部門内部の「近代」と「在来」・「大経営」と「中小経営」の併存。前者は成長率が高く、後者は量的比重が大きい。解釈には「旧生産様式」残存説、「大経営」による利用・再編成説、「均衡成長」説があり、谷本は複層的経済発展論を提示する。"}], "essay": [{"q": "明治初期の2000錘紡績の失敗と対比しつつ、大阪紡績会社の成功を可能にした条件を論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>2000錘紡績：技術のみの移植、社会的技術基盤の欠如（地方立地・保守困難）、規模過小</li> <li>大阪紡績：株式会社による資本調達（渋沢栄一・華族出資）</li> <li>昼夜二交替制＝資本節約、1万錘の規模、蒸気機関の採用</li> <li>都市立地：金属加工業・技術者（工科大学校）・労働者リクルート</li> <li>機械依存技術にも社会的基盤が必要という含意</li> </ul><br><b>▸ 解答例</b><br>綿糸輸入の増大を受けて明治政府は輸入代替を図り、2000錘規模の紡績機械を輸入して官営紡績所や政府助成の民間資本に経営させたが、1870年代後半から80年代にかけて不採算に終わった。失敗の本質は、技術だけを仕入れても、それを受け入れる社会的基盤がなかったことにある。紡績機械の操業には機械運転・保守・歯車など交換部品の加工が必要だが、地方立地の2000錘紡績はこうしたメンテナンスの条件を欠き、規模も小さすぎた。これに対し1883年設立の大阪紡績会社は、条件を体系的に満たした。第一に、渋沢栄一の仲介機能のもと華族の出資と有力実業家・商人の追随によって株式募集に成功し、株式会社という新制度で1万錘規模の資本を調達した。第二に、昼夜二交替制によって機械稼働率を高め、資本不足経済における資本節約――労働利用による資本回転率の引き上げ――を実現した。第三に、外国人技術者に加え工科大学校出身の日本人技術者を活用し、都市立地により金属加工技術を調達して修理・保全と操業安定を確保した。第四に、労働者を都市下層から、さらに遠隔地募集へと広げ、作業工程を不熟練化して大量の若年女性労働力を利用した。大阪紡績の成功は、機械に依存する技術であっても、関連工業・交通・人材といった社会的な技術基盤と結合してはじめて定着することを示している。"}, {"q": "賃織工賃の季節変動とその要因に言及しつつ、産地織物業における問屋制経営の特徴を論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>季節変動の要因：賃織の担い手は小農世帯の（主に女性）労働力→農繁期は織物労働の供給が減り工賃上昇、農閑期は供給増で低下</li> <li>問屋制（織元―賃織）：固定費節約、不況時のバッファー、柔軟な品揃え、低賃金利用</li> <li>就業側の自律性：耕作の合間の世帯内労働配分</li> <li>取引コスト（着服・納期）とその管理（歩留まり把握・地理的集約・長期取引）</li> <li>小農社会の労働力基盤が問屋制を規定</li> </ul><br><b>▸ 解答例</b><br>賃織工賃が季節的に変動するのは、賃織の担い手が専業労働者ではなく、農業を営む小農世帯の家族労働力、とりわけ女性だからである。農繁期には労働力が耕作に振り向けられて織物への労働供給が減少するため工賃は上昇し、農閑期には労働供給が増加して工賃は低下する。すなわち工賃の季節変動は、織物業が農家の世帯内労働配分に組み込まれていたことの表れである。この労働力基盤の上に成立したのが、織元が賃織農家に原料糸を前貸しして織賃を支払う問屋制家内工業だった。経営側にとってその特徴は、集中作業場への固定投資や固定費を節約でき、需要変動に対しては発注量の調整で対応して不況時のバッファーとできること、多様な取引先に応じた柔軟な品揃えが可能なこと、そして農家の低賃金労働を利用できることにある。就業側にも、農業と両立できる就業選択の自律性という利点があった。他方、分散した生産には原料糸の着服や納期遅延といった取引コストの問題が伴い、織元は原料糸歩留まりと発注量の関係の把握、発注先の地理的集約化、長期取引と接触頻度の増加によってこれを管理した。産地織物業の問屋制経営は、小農社会の労働力賦存に適合した生産組織であり、工場制と併存する日本の複層的な工業化の一翼を担ったのである。"}, {"q": "同じ綿業でありながら、紡績業では大工場（工場制）が、織物業では問屋制家内工業が選択されたのはなぜか。技術の性格と生産要素の賦存状況から論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>紡績：技術が資本集約的な機械に体化→資本財の規定性→工場制が不可避</li> <li>織物：技術が労働集約的→労働力賦存（小農社会）の規定性→問屋制</li> <li>紡績の資本節約（昼夜二交替）vs 織物での夜間労働の不利（ランプ代・火災）</li> <li>結論：生産組織の複層的展開、小農社会の重要性</li> </ul><br><b>▸ 解答例</b><br>生産組織の選択を規定したのは、各部門の技術がどの生産要素に体化されていたかである。紡績技術は、リング紡績機など資本集約的な機械そのものに体化されており、一定規模の機械設備と動力源を備えた集中作業場なしには競争力ある生産が不可能だった。この資本財の規定性ゆえに、資本が乏しい日本でも、株式会社による資本調達や昼夜二交替制による資本回転率の引き上げといった工夫を伴いつつ、工場制の移植が選択された。これに対し織物の生産技術は労働集約的であり、手機や安価な国産力織機で小規模に生産できたため、生産組織は労働力の賦存状況に規定された。日本の労働力の供給基盤は、農業経営と世帯内労働配分を維持する小農社会であり、農家の余剰労働力を柔軟に利用できる問屋制家内工業が適合的だった。工場に集めて夜間も操業する方式は、織物業ではランプ代と労働効率の低下、綿ぼこりとランプによる火災の頻発という難点があり、必ずしも得策ではなかった。要するに、資本財が規定する紡績は工場制へ、労働力基盤が規定する織物は問屋制へと分岐したのであり、この生産組織の複層的展開こそ、小農社会を基盤とする日本の工業化の特質である。"}]}, {"title": "第4講 国家と貨幣", "sub": "", "qa": [{"q": "貨幣の三つの機能は。", "a": "価値尺度・流通手段・価値の蓄蔵手段。"}, {"q": "国家と貨幣をめぐる二つの論点は。", "a": "①貨幣と財政の関係（貨幣高権＝発行権を握り貨幣発行益を得る、財政需要に応じた発行）②貨幣と対外経済関係（為替相場をめぐる国家の制度選択）。"}, {"q": "三貨制度における金貨・銀貨・銭貨の性格と単位は。", "a": "金貨＝計数貨幣（1両＝4分＝16朱）、銀貨＝秤量貨幣（単位は匁）、銭貨＝計数貨幣（1貫文＝1000文）。西日本は銀貨圏、東日本は金貨圏。"}, {"q": "三貨の公定相場は。", "a": "1両＝50匁＝4貫文から、のちに1両＝60匁＝4貫文へ改められた。"}, {"q": "幕府が貨幣改鋳益を得る仕組みを説明せよ。", "a": "品位を落としたり量目を減らしたりする「悪鋳」を行い、旧貨と新貨を等価交換（旧貨1対新貨1）させることで改鋳益を得て財政支出に充てた（増歩交換と対比される）。"}, {"q": "藩札の信用の基盤は何か。乱発するとどうなるか。", "a": "幕府貨幣との兌換（交換保証）と藩そのものの信用。乱発すれば藩札の価値は暴落した。"}, {"q": "貨幣数量説の交換方程式と各記号の意味は。", "a": "MV＝PT。M＝貨幣供給量、V＝流通速度、P＝物価水準、T＝取引量。貨幣供給の増加が取引の活発化につながるのか、単にインフレを招くだけなのかという論点。"}, {"q": "南鐐二朱銀（1772年）はなぜ貨幣史の転換点なのか。", "a": "銀貨でありながら「8枚で小判1両」と定められた計数貨幣で、含有銀量（21.1匁）は本来の1両相当（27.6匁）より少なく銀を過大評価していた。素材価値ではなく幕府が定めたから通用する性格が強まり、「金両本位制」への胎動・補助貨幣の誕生・貨幣国定説的観念への移行を意味した。"}, {"q": "開港時に金が大量流出したメカニズムを説明せよ。", "a": "「内外貨幣の同種同量交換の原則」のもと、金銀比価が日本国内では1対5（天保一分銀）、国際的には1対15と乖離していたため、外国商人が日本で銀を金に換え海外で銀に戻す裁定（アービトラージ）で差益を得た。"}, {"q": "金流出への幕府の対策と、その副作用は。", "a": "金の相対価値を引き上げ、それまでの1両を実質3両として扱った（従来の3倍の銀貨が必要に）。これが開港インフレーションを引き起こし、金貨を持つ者と賃金生活者の格差を拡大させた。"}, {"q": "新貨条例（1871年）の内容と、実際の運用は。", "a": "「円」が誕生し、金1円＝米金ドル1ドル＝1洋銀、1円＝金1.5グラムと定めた。制度上は金本位制だが、世界的な銀価低落で金円は流出・退蔵され、事実上は銀円（貿易銀）基準の運用となった。"}, {"q": "明治初期の紙幣インフレーションの要因を挙げよ。", "a": "金札など不換紙幣の大量発行（3000万両以上）、大隈重信の積極財政（1873〜81）、士族授産・反乱鎮圧という封建制解体のコスト、西南戦争（1877年、征討費4156万円）、政府紙幣を支払準備とする国立銀行券の増発。"}, {"q": "地租改正はなぜ財政上の問題を生んだか。", "a": "地租は土地価格の3％（のち2.5％）の定額だったため、物価上昇は実質的な減税となり、インフレ下で財政を圧迫した。"}, {"q": "松方財政の内容と帰結を説明せよ。", "a": "1881年からの緊縮財政の徹底と増税（酒税など）による超均衡予算で紙幣を償却し、銀紙格差を解消。1882年に日本銀行を設立し、1885年に銀兌換券を発行・流通させた。これにより財政と貨幣制度が分離し、通貨発行を中央銀行が担う体制が整った。"}, {"q": "銀本位制下の為替相場の特徴は。", "a": "銀貨圏（中国など）に対しては固定相場、金貨圏（欧米・インドなど）に対しては変動相場。相場は日本の経常収支とは独立に、世界的な銀の需給（金銀比価）で決まった。"}, {"q": "1897年の金本位制採用の内容は。為替相場はどうなったか。", "a": "貨幣法で1円＝金0.75グラム（新貨条例の半分）≒0.5ドルと固定。金兌換と金輸出入の自由のもと、為替相場は金現送点の範囲に収まる固定相場制として機能した（金貨国と一定、銀貨国に対しては円高）。"}, {"q": "第二次大戦後の通貨制度の推移を順に述べよ。", "a": "戦時補償・復興金融公庫融資による発行過剰でハイパー・インフレ→ドッジ・ラインの急激な緊縮で終息→1ドル＝360円の固定相場制（IMF・ブレトンウッズ体制）→1971年ニクソン・ショック→変動為替相場制へ移行。"}], "essay": [{"q": "南鐐二朱銀の発行が日本貨幣史上に持つ意義を、三貨制度における銀貨の性格と対比しつつ論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>三貨制度：銀貨は秤量貨幣（重さで通用）＝素材価値に基づく</li> <li>南鐐二朱銀＝銀貨なのに計数貨幣（8枚＝1両）</li> <li>含有銀21.1匁＜1両相当27.6匁＝銀の過大評価</li> <li>「金両本位制」への胎動、補助貨幣の誕生、貨幣国定説的観念への移行</li> </ul><br><b>▸ 解答例</b><br>徳川幕府の三貨制度において、銀貨は重さを量って通用する秤量貨幣であり、その価値は含有する銀という素材そのものの価値に基づいていた。これに対し1772年に発行された南鐐二朱銀は、銀貨でありながら「8枚で小判1両に換える」と額面を定められた計数貨幣だった。しかも南鐐二朱銀8枚に含まれる銀は21.1匁にすぎず、当時の公定相場（金1両＝銀貨60匁＝含有銀量27.6匁）に照らせば、明らかに銀を過大評価した設定である。つまりこの貨幣は、素材価値によってではなく、幕府が定めたから通用するという性格を強く帯びていた。その意義は三つに整理できる。第一に、銀貨を金の単位体系（両・分・朱）に組み込む「金両本位制」への胎動である。第二に、額面が素材価値を上回る小額貨幣、すなわち補助貨幣の誕生である。第三に、貨幣の価値は金属素材ではなく国家が定めるとする「貨幣国定説的観念」への移行である。南鐐二朱銀は、近代的な管理通貨への長い道程の出発点に位置づけられる点で、日本貨幣史の転換点だったといえる。"}, {"q": "開港期に金貨が大量に流出したメカニズムと幕府の対応、その経済的帰結を論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>鎖国下で金銀比価が国際相場から独立（金銀輸出抑制）</li> <li>同種同量交換の原則＋比価の乖離（1対5 vs 1対15）→裁定取引→金流出</li> <li>対応：金の相対価値引き上げ（1両→実質3両）＝万延改鋳</li> <li>帰結：開港インフレーション、金貨保有者と賃金生活者の格差拡大</li> </ul><br><b>▸ 解答例</b><br>鎖国的な体制のもとで日本は金銀の輸出を抑制していたため、国内の金銀比価は国際相場から独立して展開し、金への一元化志向もあって銀が相対的に高く評価されていた。開港に際しては「内外貨幣の同種同量交換の原則」が適用されたが、このとき地金レベルの国際比価が1対15であるのに対し、日本の天保一分銀を基準とする国内比価は1対5と大きく乖離していた。外国商人は洋銀を日本国内で金に換え、その金を海外で銀に戻すだけで大きな差益を得られたため、この裁定取引によって金が大量に流出した。幕府は対策として金の相対価値を引き上げ、それまでの1両を実質3両として扱い、金1両を得るのに従来の3倍の銀貨を要するよう改めた。これにより比価の乖離は解消され金流出は止まったが、貨幣の名目量が一挙に膨張したため開港インフレーションが発生した。物価騰貴は、金貨を持つ者には資産価値の維持をもたらす一方、賃金で生活する者の実質所得を切り下げ、両者の格差を拡大させた。開港期の貨幣問題は、閉鎖経済下で形成された国内の相対価格体系が世界市場と接続される際の摩擦がいかに大きいかを示す事例であり、幕末の社会不安の経済的背景ともなった。"}, {"q": "明治初期の紙幣インフレーションから金本位制採用（1897年）に至る通貨制度確立の過程を、財政と貨幣制度の関係に着目して論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>新貨条例（1871）と円の誕生、事実上の銀円運用</li> <li>財政の紙幣依存：金札・大隈積極財政・西南戦争・国立銀行券→インフレ高進</li> <li>地租定額制→物価上昇が実質減税に</li> <li>松方財政：超均衡予算・紙幣償却→銀紙格差解消→日銀設立（1882）・銀兌換券（1885）＝財政と貨幣の分離</li> <li>日清戦争賠償金→金本位制（1897）＝対外関係の局面へ</li> </ul><br><b>▸ 解答例</b><br>1871年の新貨条例で「円」が誕生し、制度上は金本位制が採用されたが、世界的な銀価低落のもとで事実上は銀円基準の運用となった。問題は、財政が貨幣発行に依存し続けたことである。金札をはじめとする不換紙幣が大量に発行され、大隈重信の積極財政（1873〜81年）は経済発展のための資本供給と士族授産・反乱鎮圧という封建制解体のコストを紙幣増発で賄い、1877年の西南戦争では歳出決算に匹敵する4156万円もの征討費が加わった。政府紙幣を支払準備とする国立銀行券の発行もこれを増幅し、紙幣インフレーションが高進した。地租が定額だったため、物価上昇は実質的な減税となって財政をさらに圧迫した。この悪循環を断ったのが1881年からの松方財政である。緊縮の徹底と増税による超均衡予算で紙幣を償却し、銀と紙幣の格差（銀紙格差）を解消したうえで、1882年に日本銀行を設立し、1885年に銀兌換券を発行させた。これにより通貨発行は財政から切り離されて中央銀行に委ねられ、兌換制度に基づく貨幣価値の安定が制度化された。さらに1897年、日清戦争賠償金が金で支払われたことを正貨の裏付けとして金本位制が採用され、1円＝金0.75グラムの固定相場が成立した。この過程は、財政需要と貨幣価値安定の綱引きが、中央銀行制度と金兌換という近代的通貨制度の確立によって決着していく道筋を示している。"}]}, {"title": "第2講 「公共財」供給と政府（国家と経済）", "sub": "", "qa": [{"q": "国家が経済に対して果たす三つの機能は。", "a": "利害の裁定、経済発展の育成、公共財の供給。"}, {"q": "公共財の二つの性質と、それによる財の分類を述べよ。", "a": "非排除性（対価を払わない人を排除しにくい）と非競合性（誰かの消費が他人の消費を減らさない）。両方を満たせば純粋公共財、非競合性のみならクラブ財、非排除性のみならコモンプール財。"}, {"q": "公共財が市場では過小供給になる理由と、政府の役割は。", "a": "受益と費用負担の対応関係が成立しにくくフリーライダーが発生するため、供給者・供給量が過小になる（または消費過剰）。そこで政府が強制力によって租税として費用を集め、最適な量まで供給する。"}, {"q": "統一政権の誕生は公共財の観点から何を意味したか。", "a": "領土の裁定者の出現。自力救済権の凍結（「惣無事」）によって治安維持・統治（裁判を含む）が可能になり、政治的安定がもたらされた。執行費用は年貢という税で賄われた。"}, {"q": "徳川の財政機構の特徴は。", "a": "分権的であり、幕府と大名という支配者間の秩序の上に成り立っていた（家産制国家の側面）。"}, {"q": "享保期（1730年頃）の幕府財政の歳出の特徴を、近代（1925年）と対比せよ。", "a": "家臣団への支給と徳川家の家政関係が大きな比重＝「支配者集団の維持」に多くが向けられた。近代の中央政府（1925年）では軍事・戦争関係が歳出の約3割を占めたのと対照的。"}, {"q": "「御救」の内容と、18世紀後半以降の変化は。", "a": "百姓の困窮に対する扶助として幕府・藩が夫食貸付・貯麦・置籾などを実施。18世紀後半以降は農民負担による社倉の設立や富裕者による直接救済へ移った。"}, {"q": "灌漑・水利施設の建設・維持管理の担い手はどう変化したか。", "a": "幕府が担う「御普請」から「国役普請」「自普請」へ。村入用・郡中入用といった「地方財政」が形成され、公共財の供給主体が幕府・藩から民間・地域へ広がった。"}, {"q": "清の公共財供給の特徴は。", "a": "中央集権的専制国家として飢饉対策の大規模な国家穀物備蓄を行ったが、それは徴税・統治への制約とも表裏だった。"}, {"q": "イギリスの公共財供給の特徴は。", "a": "名誉革命（1688）後に議会が優越し軍事財政国家へ展開。軍事力と海外覇権を整備された徴税機構と公債で支えた。有料道路（ターンパイク）は公益団体が担い、救貧は救貧法のもと教区財政で処理された。"}, {"q": "国家類型を捉える理念的な対比軸は。", "a": "「家産制国家」と「租税国家」の対比。"}, {"q": "明治国家のスローガンと、インフラ・教育における特徴は。", "a": "「富国強兵」と「殖産興業」。財政規模を段階的に拡大させ、インフラ投資や教育では地方財政が大きな役割を果たした（教育費負担は国・府県・市町村に分かれた）。"}, {"q": "1920年代の中央―地方関係の展開は。", "a": "教育費の国庫補助が拡大し、シビル・ミニマム（市民生活の最低保障）の発想へつながり、地方交付金制度による財政調整も整えられていった。"}, {"q": "20世紀における国家機能拡大の二つの方向は。", "a": "経済開発を主導する国家（開発独裁論と対比される）と、資本主義経済の安定装置としての福祉国家（社会主義国家形成のインパクトが背景）。"}, {"q": "公共財供給に関与した「中間団体」の例を国別に挙げよ。", "a": "イギリス近代の「チャリティー」、中国における同郷団体、日本の「村」の機能。国家と民間、中央と地方に加え、中間団体が絡み合って公共財を供給してきた。"}], "essay": [{"q": "徳川幕府は「公共財」の供給者だったといえるか。財政構造と供給の実態を踏まえて論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>供給者としての側面：惣無事＝治安・裁判、城下町建設、治水・港湾などの社会資本</li> <li>限界：分権的財政、家産制国家の側面、歳出は支配者集団の維持が中心（享保期）</li> <li>18世紀後半以降、供給主体は民間・地域へ（社倉・自普請・地方財政）</li> <li>結論：部分的な供給者であり、近代的租税国家とは異なる類型</li> </ul><br><b>▸ 解答例</b><br>徳川幕府が公共財の供給者としての機能を果たした側面は確かにある。統一政権の成立は「惣無事」による自力救済権の凍結を意味し、治安維持と裁判という最も基礎的な公共財を供給して政治的安定をもたらした。また幕府・大名の財政支出は、城下町建設や、治水・利水のための河川工事、年貢廻送のための港湾整備といった「社会資本」形成に向けられた。しかしその供給には明確な限界があった。徳川の財政機構は幕府と大名の秩序の上に立つ分権的なもので、領主階層の利害が絡む家産制国家の側面を持ち、享保期の幕府歳出を見ても家臣団への支給と徳川家の家政関係が中心であり、「支配者集団の維持」に多くが費やされていた。さらに18世紀後半以降になると、御救は農民負担の社倉や富裕者の直接救済へ、御普請は国役普請・自普請へと移り、村入用・郡中入用という地方財政が形成されて、公共財供給の実質的な担い手は民間・地域社会へと広がっていった。したがって徳川幕府は、治安と一部の社会資本については供給者だったが、強制的な徴税によって公共財を体系的に供給する近代的租税国家とは類型を異にする、限定的・部分的な供給者だったと評価できる。"}, {"q": "近世における公共財供給のあり方を、日本・清・イギリスの比較を通じて論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>比較軸：家産制国家と租税国家、供給主体（国家／民間／中間団体）</li> <li>日本：分権的・家産制的、担い手が地域・民間へ移行</li> <li>清：中央集権的専制国家の穀物備蓄（徴税・統治の制約と表裏）</li> <li>イギリス：軍事財政国家（徴税機構＋公債）、ターンパイク・教区救貧</li> <li>公共財の切り口から経済社会の類型的特質が浮かぶ（谷本の主張）</li> </ul><br><b>▸ 解答例</b><br>公共財供給のあり方は国家の類型と結びついており、理念的には「家産制国家」と「租税国家」の対比が軸になる。近世日本では、幕府・大名が治安・裁判と城下町建設・治水などの社会資本を供給したが、財政機構は分権的で家産制国家の側面が強く、18世紀後半以降は社倉や自普請、村入用・郡中入用に見られるように、供給の担い手が地域・民間へと広がった。清は中央集権的な専制国家として、飢饉対策に大規模な国家穀物備蓄を実施したが、それは徴税や統治への制約と表裏の関係にあった。イギリスは名誉革命後に議会が優越する軍事財政国家へと展開し、整備された徴税機構と公債によって軍事力と海外覇権という「公共財」を供給する一方、有料道路は公益団体が、救貧は救貧法のもと教区財政が担うなど、国家以外の主体との分業が制度化されていた。三者の比較から明らかなのは、公共財の内容（軍事・治安から救貧・インフラ・教育へ）と供給者（国家・民間・中央・地方・中間団体）の組み合わせが各社会で大きく異なることであり、公共財の供給という切り口から、それぞれの経済社会の類型的な特質が浮かび上がるという点である。"}]}, {"title": "第11講 国際経済関係", "sub": "", "qa": [{"q": "金属本位制のもとで経常収支の赤字は何を引き起こすか。管理通貨制との違いは。", "a": "銀または金の流出→正貨危機→通貨の収縮とデフレ圧力→兌換性の維持困難。管理通貨制では赤字は為替相場の下落として現れ、輸入余力の減少につながる。"}, {"q": "産業革命期の日本の輸出品を三分類せよ。雑貨の性格は。", "a": "繊維品（生糸・綿糸・織物）、鉱産物（銅・石炭）、雑貨（陶磁器・マッチ・真田・花筵・メリヤスなど）。いずれも労働集約的製品。雑貨は合計すれば上位に来る比重を持ち、ヨーロッパ製品に対する下級代替財として所得の低い地域に売れた。"}, {"q": "輸入品の構成と、貿易収支を黒字にしにくくした品目は。", "a": "工業製品（綿布）、食料（米）、農業生産要素（油粕）、工業原料（綿花）、投資財（機械・鉄）。工業化を進めるほど増える機械・鉄などの投資財は輸入代替できず、収支を圧迫した。"}, {"q": "産業革命期の地域別収支構造を述べよ。", "a": "対ヨーロッパ＝入超（工業品・生産手段の輸入）、対南アジア＝入超（工業原料）、対アメリカ＝出超（生糸・雑貨・鉱産物）、対東・東南アジア＝出超（綿製品など）。先進地域から資本財・原料を買い後発地域へ消費財を売る「中継的」位置。"}, {"q": "日清戦争の賠償金はなぜ重要だったか。", "a": "金で支払われたため正貨（金）の裏付けを与え、金本位制採用（1897）と、輸入拡大による発展の持続を支えた。"}, {"q": "日露戦争の戦費調達の方法と、その後の問題は。", "a": "日清戦争賠償金が尽きてきたため、外国への支払いに充てる目的で外債を発行（主にロンドン市場）。返済は容易でなく、新規発行による借り換えで国債残高が積み上がり、1910年以降は国債価格が低下気味となった。"}, {"q": "第一次世界大戦が「天佑」と呼ばれた理由を、収支の項目別に説明せよ。", "a": "ヨーロッパが戦争に忙殺されるなか輸出が伸び（貿易収支の改善）、船舶需要の高まりで海運＝外航運賃や保険料の受け取りが増大（貿易外収支の改善）。正貨危機・国際収支の危機から脱却し、鉄鋼業も同時に成長した。"}, {"q": "1918年に日本の対外ポジションはどう転換したか。", "a": "ロシア・中国への借款（西原借款）・投資を行い、対外債権が対外債務を上回って純資本輸出国となった。"}, {"q": "日本の植民地とその領有年、勢力圏を挙げよ。", "a": "台湾（1895〜）・樺太南半分（1905〜）・朝鮮（1910〜）。勢力圏として1910年以前の朝鮮、1905年以降の「満洲」。"}, {"q": "植民地との貿易構造と、その意味は。", "a": "輸入＝食料（朝鮮米・台湾米・台湾の砂糖）と資源（鉄・石炭・非鉄金属）、輸出＝消費財（綿製品などを中国・朝鮮へ）。輸入代替と輸出市場の確保、すなわち外貨の節約と獲得を意味した。"}, {"q": "朝鮮でのジャポニカ米生産や台湾の製糖会社設立が進められた背景は。", "a": "米騒動を経て食糧自給が政策課題となったが、東南アジア産米は日本で需要される米と質が異なった（低所得層向け）。砂糖もジャワ・中国からの輸入に頼らず外貨を使わずに生産する政策として、台湾に日本資本の製糖会社が設立された。"}, {"q": "1930年代の地域別収支構造を述べよ。", "a": "対植民地（勢力圏）＝食料・工業資源を輸入し重化学工業品等を輸出して黒字。対その他アジア＝消費財輸出・綿花輸入で小幅黒字。対欧米＝消費財輸出・資本財輸入で大幅赤字。植民地以外に対しては一貫して赤字だった。"}, {"q": "「円建て黒字のジレンマ」とは何か。それは何をもたらしたか。", "a": "植民地との取引は円通貨による受取超過であり、外貨決済に充当できない。そのため軽工業品のダンピング輸出につながったが、輸出拡大は貿易摩擦を生み、日印会商・日英会商・日蘭会商といった貿易交渉を強いられた。"}, {"q": "対米生糸輸出が減少した要因は。", "a": "世界恐慌と化学繊維の登場。"}, {"q": "谷本が最終講の最後に残した問いは何か。", "a": "貿易摩擦を乗り越えて非植民地圏へ輸出を拡大する道は、本当にあり得ない選択肢だったのか（日本は帝国圏のアウタルキー＝中国侵略の道を選択し、それが戦争への道を準備した）。"}], "essay": [{"q": "明治期日本の経常収支がなかなか黒字化しなかった理由を、貿易構造（品目・地域別収支）を踏まえて論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>輸出＝労働集約的製品（生糸・雑貨・鉱産物）、輸入＝資本財・原料</li> <li>工業化の進展そのものが機械・鉄の輸入を増やす構造</li> <li>投資財は輸入代替不能→構造的な赤字圧力</li> <li>地域別：対欧米・南アジア入超、対米・東アジア出超＝中継的位置</li> <li>賠償金・外債で穴埋め→WWIで劇的改善</li> </ul><br><b>▸ 解答例</b><br>明治期の日本の輸出は、生糸を筆頭とする繊維品、銅・石炭の鉱産物、そしてマッチや陶磁器などの雑貨という労働集約的製品から成っていた。雑貨は個々には小さくても合計では大きな比重を占め、ヨーロッパ製品の下級代替財として所得の低い地域に販路を持った。しかし輸入側には、綿布などの工業製品、米という食料、油粕という農業生産要素、綿花という工業原料に加え、機械・鉄という投資財が並んでいた。問題は、工業化を進めれば進めるほど機械や鉄の輸入が増える構造であり、これら投資財は当時の日本では輸入代替が不可能だったため、貿易収支には構造的な赤字圧力がかかり続けた。地域別に見ると、ヨーロッパと南アジアに対しては工業品・生産手段や原料の輸入で入超、アメリカと東・東南アジアに対しては生糸・雑貨・綿製品の輸出で出超であり、日本は先進地域から資本財・原料を買い、後発地域へ消費財を売る「中継的」位置にあった。この赤字構造の穴を埋めたのが日清戦争の金建て賠償金であり、それが尽きると日露戦争期以降はロンドン市場での外債発行に依存した。経常収支の慢性的赤字が最終的に解消するのは、第一次世界大戦による輸出と海運収入の急増＝「天佑」を待たねばならなかったのである。"}, {"q": "1930年代日本の対外経済関係が抱えたジレンマを説明し、それが「戦争への道」につながった論理を論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>構造：工業発展→資本財・原料輸入増→輸出増が必要</li> <li>対植民地圏黒字は円建て＝外貨決済に使えない、対欧米は大幅赤字</li> <li>ダンピング輸出→貿易摩擦（日印・日英・日蘭会商）</li> <li>非植民地圏への輸出拡大が困難→帝国圏アウタルキー志向→中国侵略・国際的孤立</li> <li>谷本の問い：もう一方の道はあり得なかったのか</li> </ul><br><b>▸ 解答例</b><br>1930年代の日本の対外経済関係は、地域ごとに異なる収支構造を持っていた。植民地・勢力圏からは食料と鉄・石炭などの工業資源を輸入し、重化学工業品を輸出して受取超過だったが、この黒字は円通貨によるものであり、外貨決済には充当できなかった。一方、欧米諸国に対しては資本財の輸入により大幅な支払超過であり、植民地以外に対しては一貫して赤字だった。工業発展は資本財・原料の輸入増を不可避とし、それを賄う外貨獲得のための輸出増を必要とする。そこで軽工業品の低価格輸出が拡大したが、これは「為替ダンピング」として貿易摩擦を引き起こし、日印会商・日英会商・日蘭会商といった交渉を強いられた。ここに深刻なジレンマがあった。貿易摩擦を乗り越えて非植民地圏への輸出を拡大できないとすれば、重化学工業化の推進は、資源も市場も帝国圏内で完結させるアウタルキー（自給圏）の志向に行き着く。そしてそれは「満洲」から中国本土への侵略と国際的批判、さらなる孤立という悪循環を意味した。結局日本は後者の方向を選択し、対外経済関係の面から戦争への道が準備されることになった。谷本は、貿易摩擦を乗り越えて非植民地圏へ輸出を拡大する前者の道は本当にあり得ない選択肢だったのか、という問いを投げかけている。"}]}, {"title": "総合 全体を貫く視点", "sub": "", "qa": [{"q": "講義全体を貫く「第一の糸」＝資源制約とその緩和の系譜を、関係する講とともに述べよ。", "a": "銀・銅の枯渇→輸入代替（第1・4講）、土地・草肥の制約→金肥導入（第8講）、開港・海外資源への依存（第8・11講）。ヨーロッパのghost acreage・石炭による突破（大分岐論）と対比される。"}, {"q": "「第二の糸」＝技術・組織の移転と在来的発展の内容は。", "a": "欧米型モデルの移植（紡績）、資源賦存に合わせた適正技術（製糸）、小農社会を基盤とする分散型生産組織（織物）の併存＝複層的発展。谷本のいう「日本型経済」の核心（第7・9講）。"}, {"q": "「第三の糸」＝国家・貨幣・対外関係の連関は最終的にどこへ行き着くか。", "a": "公共財の供給者としての国家（第2講）、貨幣制度と財政の関係（第4講）、通貨体制が規定する国際経済関係（第11講）が連動し、1930年代のアウタルキー志向と戦争への道にまで及ぶ。"}, {"q": "「勤勉革命」と「産業革命」を対比せよ。", "a": "勤勉革命（速水融）＝土地制約下の日本で労働多投により生産を拡大した経路（労働集約）。産業革命（イギリス）＝高賃金・安価な石炭のもと資本・機械への代替で生産を拡大した経路（資本集約）。生産要素の賦存状況の違いが対照的な発展経路を生んだ。"}, {"q": "開港前後で共通する「小農社会」の役割を、複数の講を横断してまとめよ。", "a": "近世：労働多投型農法・家族労働との適合（第10講）、綿作・農村工業の担い手（第9講）。近代：問屋制家内工業・賃織の労働力基盤、生産組織の複層的展開の規定要因（第7講）。小農社会は近世から近代まで日本型経済の土台であり続けた。"}], "essay": [{"q": "近世から近代に至る日本の経済発展を、「資源制約とその緩和」という観点から通観しなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>銀・銅の枯渇→輸入代替・技術定着（第1講）</li> <li>土地・草肥制約→労働多投・金肥「陸から海へ」（第8・10講）</li> <li>開港→大豆粕「海から陸へ」、工業原料・資本財の輸入（第3・8講）</li> <li>植民地圏＝食料・資源の確保＝外貨の節約（第11講）</li> <li>各段階で「拡大→制約→対応」のサイクル。ヨーロッパの突破（大分岐）との対比</li> </ul><br><b>▸ 解答例</b><br>日本の経済発展は、資源制約に直面するたびにその緩和の途を見出す過程として通観できる。近世初期、貿易の対価だった銀・銅が採掘技術の限界により「枯渇」すると、その制約はアジア物産の輸入代替と技術定着を促し、近世的な産業発展の出発点となった。17世紀の外延的拡大が限界に達すると、土地制約のもとで労働と肥料を多投する小農経営が確立し、草肥の制約に対しては「陸から海へ」、すなわち干鰯・鰊粕などの金肥導入と肥料の地域的分業によって応えた。開港は制約緩和の場を海外へ広げ、「海から陸へ」＝満洲大豆粕の輸入が肥料集約的農業を支える一方、綿花などの工業原料と機械・鉄という資本財の輸入が工業化を可能にした。しかし資本財輸入は経常収支の慢性的赤字という新たな制約を生み、日清戦争賠償金・外債・第一次大戦の「天佑」がそれを繋いだ。さらに植民地圏からの食料・資源の調達は外貨の節約を意味したが、円建て黒字のジレンマを通じて1930年代のアウタルキー志向へと帰結した。このように日本の発展は「拡大→制約→対応」のサイクルの反復であり、新大陸のghost acreageと石炭によって制約を一挙に突破したヨーロッパ（大分岐論）との対比において、その特質が浮かび上がる。"}, {"q": "日本の工業化における「複層的発展」とは何か。三つの生産パターンに言及しつつ、「日本型経済の形成」という視点から論じなさい。", "a": "<b>▸ 解答のポイント</b><ul> <li>三パターン：欧米型移植（紡績）／適正技術（製糸）／分散型生産組織（織物）</li> <li>「近代」と「在来」の併存：成長率は前者、量的比重は後者</li> <li>規定要因：資源賦存（資本稀少・労働豊富）と小農社会</li> <li>単なる後進性の残存ではない＝キャッチアップ史観への修正</li> <li>日本型経済の形成史という講義全体の視点との接続</li> </ul><br><b>▸ 解答例</b><br>日本の工業化は、欧米モデルの単純な移植では説明できない。第一のパターンは欧米型生産モデルの移植であり、機械制綿糸紡績業や製鉄・造船のように、資本財に体現された技術と集中作業場が競争上不可避な部門では、株式会社や昼夜二交替制といった工夫を伴って大工場が建設された。第二は適正技術と生産組織であり、製糸業では仏伊の技術を糸繰器械の簡便化や水力利用によって日本の小工場向けにアレンジし、製糸結社による品質の斉一化で世界市場に対応した。第三は分散型生産組織と産地の展開であり、織物業では小農世帯の労働力を基盤とする問屋制家内工業が、安価な国産力織機の普及を伴いながら発展した。これらは「近代」と「在来」、「大経営」と「中小経営」の併存として現れ、前者は成長率が高く、後者は量的比重が大きかった。重要なのは、在来部門が単なる旧生産様式の残存ではなく、量的にも拡大しつつ近代部門と補完し合っていた点であり、谷本はこれを複層的経済発展と呼ぶ。資本が乏しく労働が豊富という資源賦存と、近世以来の小農社会という基盤が、この複層性を規定した。すなわち複層的発展とは、キャッチアップの過程がそのまま独自の型の形成過程でもあったことを示す概念であり、「日本型経済の形成史」という講義全体の視点の核心をなしている。"}]}];

let session=null;
let lastWrongPool=null;

function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showScreen(name){
  ['setup','quiz','result'].forEach(function(s){
    document.getElementById('screen-'+s).classList.toggle('hidden', s!==name);
  });
  window.scrollTo(0,0);
}

function initSetup(){
  const list=document.getElementById('sectionList');
  list.innerHTML=DATA.map(function(sec,i){
    return '<label class="section-item">'
      +'<input type="checkbox" class="sectionChk" value="'+i+'" checked>'
      +'<span class="section-title">'+escapeHtml(sec.title)+'</span>'
      +'<span class="section-count">一問一答'+sec.qa.length+'・記述'+sec.essay.length+'</span>'
      +'</label>';
  }).join('');
}

function getSelectedModes(){
  return new Set(Array.prototype.map.call(
    document.querySelectorAll('#modeChips input:checked'), function(el){return el.value;}
  ));
}
function getSelectedSections(){
  return new Set(Array.prototype.map.call(
    document.querySelectorAll('.sectionChk:checked'), function(el){return Number(el.value);}
  ));
}

function buildPool(sectionsSet, modesSet){
  const pool=[];
  DATA.forEach(function(sec, si){
    if(!sectionsSet.has(si)) return;
    if(modesSet.has('qa')) sec.qa.forEach(function(item){
      pool.push({q:item.q, a:item.a, type:'qa', chapter:sec.title});
    });
    if(modesSet.has('essay')) sec.essay.forEach(function(item){
      pool.push({q:item.q, a:item.a, type:'essay', chapter:sec.title});
    });
  });
  return pool;
}

function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    const tmp=a[i]; a[i]=a[j]; a[j]=tmp;
  }
  return a;
}

function showError(msg){
  const el=document.getElementById('setupError');
  el.textContent=msg;
  el.classList.remove('hidden');
}
function hideError(){
  document.getElementById('setupError').classList.add('hidden');
}

function startBtnHandler(){
  const modes=getSelectedModes();
  const sections=getSelectedSections();
  if(modes.size===0){ showError('出題形式を1つ以上選んでください'); return; }
  if(sections.size===0){ showError('範囲を1つ以上選んでください'); return; }
  let pool=buildPool(sections, modes);
  if(pool.length===0){ showError('選んだ条件に該当する問題がありません'); return; }
  hideError();
  if(document.getElementById('randomToggle').checked) pool=shuffle(pool);
  beginSession(pool);
}

function beginSession(pool){
  session={pool:pool, idx:0, results:new Array(pool.length).fill(null)};
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion(){
  const item=session.pool[session.idx];
  document.getElementById('progressCount').textContent=(session.idx+1)+'/'+session.pool.length;
  document.getElementById('progressChapter').textContent=item.chapter||'';
  document.getElementById('progressFill').style.width=(session.idx/session.pool.length*100)+'%';

  const badge=document.getElementById('qTypeBadge');
  const isEssay=item.type==='essay';
  badge.textContent=isEssay?'記述式':'一問一答';
  badge.className='q-type-badge'+(isEssay?' essay':'');

  document.getElementById('qText').innerHTML=item.q;

  const essayInput=document.getElementById('essayInput');
  if(isEssay){ essayInput.classList.remove('hidden'); essayInput.value=''; }
  else { essayInput.classList.add('hidden'); }

  document.getElementById('answerBox').classList.add('hidden');
  document.getElementById('aText').innerHTML='';
  const revealBtn=document.getElementById('revealBtn');
  revealBtn.classList.remove('hidden');
  revealBtn.textContent=isEssay?'模範解答を見る':'答えを見る';
}

function revealAnswer(){
  const item=session.pool[session.idx];
  document.getElementById('aText').innerHTML=item.a;
  document.getElementById('answerBox').classList.remove('hidden');
  document.getElementById('revealBtn').classList.add('hidden');
}

function grade(correct){
  session.results[session.idx]=correct;
  session.idx++;
  if(session.idx>=session.pool.length){
    finishSession();
  } else {
    renderQuestion();
  }
}

function finishSession(){
  document.getElementById('progressFill').style.width='100%';
  showScreen('result');

  const total=session.pool.length;
  const correct=session.results.filter(function(r){return r===true;}).length;
  const pct=total?Math.round(correct/total*100):0;

  document.getElementById('ringPct').textContent=pct+'%';
  document.getElementById('ringSub').textContent=correct+'/'+total+'問正解';

  const circumference=2*Math.PI*52;
  const fg=document.getElementById('ringFg');
  fg.style.strokeDasharray=String(circumference);
  fg.style.strokeDashoffset=String(circumference*(1-pct/100));
  fg.style.stroke=pct>=80?'var(--correct)':(pct>=50?'var(--accent)':'var(--incorrect)');

  const wrongItems=session.pool.filter(function(item,i){return session.results[i]===false;});
  lastWrongPool=wrongItems;

  const wrongListEl=document.getElementById('wrongList');
  if(wrongItems.length===0){
    wrongListEl.innerHTML='<p class="all-correct">全問正解でした。</p>';
  } else {
    wrongListEl.innerHTML='<h3>間違えた問題</h3>'+wrongItems.map(function(item){
      return '<details class="wrong-item"><summary>'+item.q+'</summary>'
        +'<div class="wrong-answer">'+item.a+'</div></details>';
    }).join('');
  }
  document.getElementById('reviewWrongBtn2').classList.toggle('hidden', wrongItems.length===0);
  updateSetupReviewButton();
}

function updateSetupReviewButton(){
  const btn=document.getElementById('reviewWrongBtn');
  if(lastWrongPool && lastWrongPool.length>0){
    btn.classList.remove('hidden');
    document.getElementById('wrongCount').textContent=lastWrongPool.length;
  } else {
    btn.classList.add('hidden');
  }
}

function startReviewWrong(){
  if(!lastWrongPool || lastWrongPool.length===0) return;
  let pool=lastWrongPool.slice();
  if(document.getElementById('randomToggle').checked) pool=shuffle(pool);
  beginSession(pool);
}

function retrySameCondition(){
  if(!session) return;
  let pool=session.pool.slice();
  if(document.getElementById('randomToggle').checked) pool=shuffle(pool);
  beginSession(pool);
}

initSetup();
document.getElementById('selectAllBtn').addEventListener('click', function(){
  document.querySelectorAll('.sectionChk').forEach(function(c){c.checked=true;});
});
document.getElementById('selectNoneBtn').addEventListener('click', function(){
  document.querySelectorAll('.sectionChk').forEach(function(c){c.checked=false;});
});
document.getElementById('startBtn').addEventListener('click', startBtnHandler);
document.getElementById('revealBtn').addEventListener('click', revealAnswer);
document.getElementById('gradeRightBtn').addEventListener('click', function(){grade(true);});
document.getElementById('gradeWrongBtn').addEventListener('click', function(){grade(false);});
document.getElementById('quitBtn').addEventListener('click', function(){showScreen('setup');});
document.getElementById('reviewWrongBtn').addEventListener('click', startReviewWrong);
document.getElementById('reviewWrongBtn2').addEventListener('click', startReviewWrong);
document.getElementById('retryAllBtn').addEventListener('click', retrySameCondition);
document.getElementById('backToSetupBtn').addEventListener('click', function(){showScreen('setup');});
</script>
</body>
</html>
